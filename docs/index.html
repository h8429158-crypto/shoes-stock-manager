<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="description" content="StyleMate — your AI-powered personal wardrobe. Digitize what you own and get complete outfit suggestions for any occasion.">
<meta name="theme-color" content="#0B0F14">
<meta name="color-scheme" content="dark light">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StyleMate">
<link rel="apple-touch-icon" href="./icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="manifest" href="./manifest.webmanifest">
<title>StyleMate</title>
<style>
  :root {
    --bg: #0B0F14;
    --surface: #151B23;
    --surface-alt: #1C232D;
    --surface-hi: #232C36;
    --border: #28313D;
    --track: #232C36;
    --text: #F2F5F8;
    --dim: #8A97A6;
    --faint: #5C6875;
    --primary: #7C6FF0;
    --primary-dark: #5B4FD1;
    --accent: #E0A34E;
    --green: #3FB77E;
    --yellow: #E7B008;
    --red: #E5484D;
    --danger: #E5484D;
    --on-primary: #ffffff;
    --shadow: 0 10px 30px rgba(0,0,0,.45);

    --cat-upper: #4C8DFF;
    --cat-bottom: #B57BFF;
    --cat-footwear: #E0A34E;
    --cat-accessory: #3FB77E;

    --sys: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  :root[data-theme="light"] {
    --bg: #F4F6F9;
    --surface: #FFFFFF;
    --surface-alt: #EEF1F5;
    --surface-hi: #E6EAF0;
    --border: #DCE2EA;
    --track: #E6EAF0;
    --text: #131A22;
    --dim: #5C6875;
    --faint: #93A0AD;
    --primary: #5B4FD1;
    --primary-dark: #4A3FB8;
    --accent: #C7862F;
    --on-primary: #ffffff;
    --shadow: 0 10px 28px rgba(20,30,50,.14);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; margin: 0; padding: 0; overflow: hidden; overscroll-behavior: none; background: var(--surface); }
  body { margin: 0; padding: 0; overflow: hidden; overscroll-behavior: none; }
  body {
    font-family: var(--sys); color: var(--text);
    background: var(--surface);
    -webkit-font-smoothing: antialiased;
    position: fixed; top: 0; right: 0; bottom: 0; left: 0;
    touch-action: manipulation;
  }
  .safe-bottom {
    position: fixed; left: 0; right: 0; bottom: 0;
    height: env(safe-area-inset-bottom); background: var(--surface);
    z-index: 50; pointer-events: none;
  }
  button, input, select, textarea { font-family: var(--sys); }
  button { touch-action: manipulation; cursor: pointer; }
  :focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

  .app {
    position: absolute; top: 0; right: 0; bottom: 0; left: 0;
    max-width: 520px; margin: 0 auto;
    background: var(--bg);
    display: flex; flex-direction: column; overflow: hidden;
    border-left: 1px solid var(--border); border-right: 1px solid var(--border);
  }
  @media (max-width: 520px) { .app { border-left: none; border-right: none; } }

  .body {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: calc(env(safe-area-inset-top) + 14px) 18px 30px; scrollbar-width: none;
  }
  .body::-webkit-scrollbar { display: none; }
  .fade { animation: fade .28s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* Typography */
  .h-title { font-size: 27px; font-weight: 800; letter-spacing: -.02em; margin: 2px 0 2px; }
  .h-sub { color: var(--dim); font-size: 13.5px; margin: 0 0 16px; line-height: 1.4; }
  .sec-title { font-size: 13px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--dim); margin: 22px 2px 10px; }
  .muted { color: var(--dim); }
  .faint { color: var(--faint); }

  /* Top bar */
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 4px; }
  .brand { display: flex; align-items: center; gap: 9px; }
  .brand-mark { width: 30px; height: 30px; border-radius: 9px; background: linear-gradient(135deg, var(--primary), var(--accent)); display: grid; place-items: center; color: #fff; font-weight: 900; font-size: 16px; box-shadow: var(--shadow); }
  .brand-name { font-weight: 800; font-size: 18px; letter-spacing: -.01em; }

  /* Buttons */
  .btn { border: none; border-radius: 13px; padding: 13px 16px; font-size: 15px; font-weight: 700; background: var(--surface-alt); color: var(--text); display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
  .btn:active { transform: scale(.98); }
  .btn-primary { background: var(--primary); color: var(--on-primary); }
  .btn-accent { background: var(--accent); color: #26160a; }
  .btn-block { width: 100%; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); }
  .btn-sm { padding: 9px 12px; font-size: 13px; border-radius: 10px; }
  .btn-danger { background: rgba(229,72,77,.12); color: var(--red); }
  .icon-btn { width: 40px; height: 40px; border-radius: 11px; background: var(--surface-alt); border: 1px solid var(--border); display: grid; place-items: center; color: var(--text); font-size: 18px; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
  .card + .card { margin-top: 12px; }

  /* Chips */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { border: 1px solid var(--border); background: var(--surface); color: var(--dim); border-radius: 999px; padding: 8px 13px; font-size: 13px; font-weight: 600; white-space: nowrap; }
  .chip.active { background: var(--primary); color: var(--on-primary); border-color: var(--primary); }
  .chip.accent.active { background: var(--accent); color: #26160a; border-color: var(--accent); }

  /* Grid of items */
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .grid.two { grid-template-columns: repeat(2, 1fr); }
  .tile { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; aspect-ratio: 1/1; }
  .tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .tile .tile-meta { position: absolute; left: 0; right: 0; bottom: 0; padding: 18px 8px 7px; background: linear-gradient(transparent, rgba(0,0,0,.72)); color: #fff; font-size: 11px; font-weight: 700; }
  .tile .badge-wash { position: absolute; top: 6px; left: 6px; background: rgba(11,15,20,.82); color: #7fd0ff; font-size: 10px; font-weight: 800; padding: 3px 7px; border-radius: 999px; letter-spacing: .03em; }
  .tile .badge-fav { position: absolute; top: 6px; right: 6px; font-size: 14px; filter: drop-shadow(0 1px 2px rgba(0,0,0,.6)); }
  .swatch { display: inline-block; width: 11px; height: 11px; border-radius: 3px; border: 1px solid rgba(255,255,255,.35); vertical-align: -1px; margin-right: 4px; }

  /* Empty state */
  .empty { text-align: center; padding: 42px 20px; color: var(--dim); }
  .empty .em-ico { font-size: 42px; margin-bottom: 12px; }

  /* Inputs */
  label.fld { display: block; margin: 14px 0 0; }
  label.fld > span { display: block; font-size: 12.5px; font-weight: 700; color: var(--dim); margin-bottom: 7px; letter-spacing: .02em; }
  .input, textarea.input, select.input { width: 100%; background: var(--surface-alt); border: 1px solid var(--border); border-radius: 12px; color: var(--text); padding: 12px 13px; font-size: 15px; }
  textarea.input { resize: vertical; min-height: 64px; }
  .seg { display: flex; background: var(--surface-alt); border: 1px solid var(--border); border-radius: 12px; padding: 4px; gap: 4px; }
  .seg button { flex: 1; border: none; background: transparent; color: var(--dim); border-radius: 9px; padding: 9px 6px; font-weight: 700; font-size: 13px; }
  .seg button.active { background: var(--primary); color: var(--on-primary); }

  /* Tabbar */
  .tabbar {
    display: flex; border-top: 1px solid var(--border); background: var(--surface);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .tab { flex: 1; border: none; background: transparent; color: var(--faint); padding: 9px 4px 8px; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10.5px; font-weight: 700; }
  .tab .ti { font-size: 21px; line-height: 1; }
  .tab.active { color: var(--primary); }

  /* Sheet / modal */
  .scrim { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 100; opacity: 0; pointer-events: none; transition: opacity .22s ease; }
  .scrim.show { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 50%; transform: translateX(-50%) translateY(100%);
    bottom: 0; width: 100%; max-width: 520px; z-index: 101;
    background: var(--surface); border-radius: 20px 20px 0 0; border: 1px solid var(--border); border-bottom: none;
    max-height: 92vh; display: flex; flex-direction: column; transition: transform .28s cubic-bezier(.2,.8,.2,1);
    box-shadow: var(--shadow);
  }
  .sheet.show { transform: translateX(-50%) translateY(0); }
  .sheet-grip { width: 40px; height: 4px; border-radius: 999px; background: var(--border); margin: 10px auto 2px; flex: none; }
  .sheet-head { display: flex; align-items: center; justify-content: space-between; padding: 6px 18px 10px; flex: none; }
  .sheet-title { font-size: 18px; font-weight: 800; }
  .sheet-body { overflow-y: auto; padding: 4px 18px calc(env(safe-area-inset-bottom) + 20px); scrollbar-width: none; }
  .sheet-body::-webkit-scrollbar { display: none; }

  /* Toast */
  .toast { position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom) + 78px); transform: translateX(-50%) translateY(20px); background: var(--text); color: var(--bg); padding: 11px 18px; border-radius: 999px; font-size: 13.5px; font-weight: 700; z-index: 200; opacity: 0; pointer-events: none; transition: all .25s ease; box-shadow: var(--shadow); max-width: 90%; text-align: center; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Onboarding */
  .onb { position: fixed; inset: 0; z-index: 300; background: var(--bg); display: flex; flex-direction: column; }
  .onb-body { flex: 1; overflow-y: auto; padding: calc(env(safe-area-inset-top) + 30px) 26px 20px; display: flex; flex-direction: column; }
  .onb-foot { padding: 14px 22px calc(env(safe-area-inset-bottom) + 18px); border-top: 1px solid var(--border); background: var(--surface); }
  .onb-illus { font-size: 64px; margin: 8px 0 22px; }
  .onb-h { font-size: 27px; font-weight: 800; letter-spacing: -.02em; margin: 0 0 10px; }
  .onb-p { color: var(--dim); font-size: 15px; line-height: 1.55; margin: 0 0 8px; }
  .dots { display: flex; gap: 7px; justify-content: center; margin-bottom: 14px; }
  .dot { width: 7px; height: 7px; border-radius: 999px; background: var(--border); }
  .dot.on { background: var(--primary); width: 22px; }

  /* Outfit collage */
  .outfit { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
  .outfit-head { display: flex; align-items: center; justify-content: space-between; padding: 13px 15px 10px; }
  .outfit-title { font-weight: 800; font-size: 15px; }
  .collage { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: var(--border); }
  .collage .cell { position: relative; background: var(--surface-alt); aspect-ratio: 1/1; overflow: hidden; }
  .collage .cell.tall { grid-row: span 2; aspect-ratio: auto; }
  .collage .cell img { width: 100%; height: 100%; object-fit: cover; }
  .collage .cell .lbl { position: absolute; left: 0; bottom: 0; right: 0; padding: 12px 8px 5px; background: linear-gradient(transparent, rgba(0,0,0,.68)); color: #fff; font-size: 10px; font-weight: 700; }
  .collage .cell .swap { position: absolute; top: 6px; right: 6px; width: 26px; height: 26px; border-radius: 8px; background: rgba(11,15,20,.72); color: #fff; border: none; display: grid; place-items: center; font-size: 13px; }
  .collage .cell.empty-cell { display: grid; place-items: center; color: var(--faint); font-size: 11px; text-align: center; padding: 8px; }
  .outfit-actions { display: flex; gap: 8px; padding: 12px 14px 14px; }

  /* Weather strip */
  .weather { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; margin-bottom: 14px; }
  .weather .wx-ico { font-size: 28px; }
  .weather .wx-t { font-size: 20px; font-weight: 800; }
  .weather .wx-d { font-size: 12px; color: var(--dim); }

  /* Palette swatches */
  .pal { display: flex; gap: 8px; flex-wrap: wrap; }
  .pal .p { width: 40px; height: 40px; border-radius: 10px; border: 1px solid rgba(255,255,255,.2); position: relative; }
  .pal .p span { position: absolute; inset: auto 0 -17px; font-size: 9px; text-align: center; color: var(--dim); }

  .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .list-row { display: flex; align-items: center; gap: 12px; padding: 13px 2px; border-bottom: 1px solid var(--border); }
  .list-row:last-child { border-bottom: none; }
  .list-row .lr-ico { font-size: 20px; width: 26px; text-align: center; }
  .list-row .lr-main { flex: 1; }
  .list-row .lr-t { font-weight: 700; font-size: 15px; }
  .list-row .lr-s { color: var(--dim); font-size: 12.5px; }
  .switch { width: 46px; height: 28px; border-radius: 999px; background: var(--track); border: 1px solid var(--border); position: relative; flex: none; transition: background .18s; }
  .switch.on { background: var(--primary); border-color: var(--primary); }
  .switch::after { content: ""; position: absolute; top: 2px; left: 2px; width: 22px; height: 22px; border-radius: 999px; background: #fff; transition: transform .18s; }
  .switch.on::after { transform: translateX(18px); }

  .pill { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; background: var(--surface-alt); color: var(--dim); border: 1px solid var(--border); }
  .stat { display: flex; gap: 10px; }
  .stat .s { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 13px; text-align: center; }
  .stat .s .n { font-size: 22px; font-weight: 800; }
  .stat .s .l { font-size: 11px; color: var(--dim); font-weight: 600; margin-top: 2px; }

  .hidden { display: none !important; }
  .spin { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 999px; animation: sp .7s linear infinite; }
  @keyframes sp { to { transform: rotate(360deg); } }
  .center { display: grid; place-items: center; }

  /* Cutout stickers: contain on a subtle checker so transparency reads clearly */
  .tile img.cut, .collage .cell img.cut { object-fit: contain; padding: 8%; }
  .checker { background-color: var(--surface-alt);
    background-image: linear-gradient(45deg, rgba(128,128,128,.09) 25%, transparent 25%, transparent 75%, rgba(128,128,128,.09) 75%),
                      linear-gradient(45deg, rgba(128,128,128,.09) 25%, transparent 25%, transparent 75%, rgba(128,128,128,.09) 75%);
    background-size: 18px 18px; background-position: 0 0, 9px 9px; }

  /* ---- Studio (freeform outfit canvas) ---- */
  .studio-overlay { position: fixed; inset: 0; z-index: 260; background: var(--bg); display: flex; flex-direction: column; }
  .studio-top { display: flex; align-items: center; gap: 8px; padding: calc(env(safe-area-inset-top) + 10px) 14px 10px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .studio-top input { flex: 1; background: var(--surface-alt); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 9px 12px; font-size: 15px; font-weight: 700; }
  .stage-wrap { flex: 1; overflow: hidden; display: grid; place-items: center; padding: 14px; }
  .stage { position: relative; width: 100%; max-width: 460px; aspect-ratio: 3/4; background: var(--surface);
    border: 1px solid var(--border); border-radius: 16px; overflow: hidden; touch-action: none;
    background-image: radial-gradient(circle at 50% 35%, color-mix(in srgb, var(--primary) 9%, var(--surface)), var(--surface) 70%); }
  .stage .layer { position: absolute; left: 0; top: 0; touch-action: none; will-change: transform; cursor: grab; user-select: none; -webkit-user-select: none; }
  .stage .layer img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; -webkit-user-drag: none;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,.28)); }
  .stage .layer.sel { outline: 2px dashed var(--primary); outline-offset: 3px; border-radius: 6px; }
  .stage .handle { position: absolute; width: 30px; height: 30px; border-radius: 999px; background: var(--primary); color: #fff;
    display: grid; place-items: center; font-size: 14px; border: 2px solid var(--surface); box-shadow: var(--shadow); touch-action: none; }
  .stage .handle.del { background: var(--red); top: -15px; left: -15px; }
  .stage .handle.scale { bottom: -15px; right: -15px; cursor: nwse-resize; }
  .stage .stage-empty { position: absolute; inset: 0; display: grid; place-items: center; text-align: center; color: var(--faint); font-size: 13px; padding: 24px; }
  .studio-tray { border-top: 1px solid var(--border); background: var(--surface); padding: 8px 10px calc(env(safe-area-inset-bottom) + 8px); }
  .tray-cats { display: flex; gap: 6px; overflow-x: auto; padding: 2px 2px 8px; }
  .tray-items { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; min-height: 70px; }
  .tray-item { flex: none; width: 62px; height: 62px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface-alt); overflow: hidden; position: relative; }
  .tray-item img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }

  /* ---- Calendar ---- */
  .cal-head { display: flex; align-items: center; justify-content: space-between; margin: 6px 0 12px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .cal-dow { font-size: 10.5px; font-weight: 700; color: var(--faint); text-align: center; padding: 2px 0; }
  .cal-day { aspect-ratio: 1/1; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); position: relative; overflow: hidden; display: flex; flex-direction: column; padding: 4px; }
  .cal-day.blank { background: transparent; border: none; }
  .cal-day.today { border-color: var(--primary); }
  .cal-day .dnum { font-size: 11px; font-weight: 700; color: var(--dim); z-index: 2; }
  .cal-day.today .dnum { color: var(--primary); }
  .cal-day .planimg { position: absolute; inset: 0; }
  .cal-day .planimg img { width: 100%; height: 100%; object-fit: cover; opacity: .9; }
  .cal-day .dot-plan { position: absolute; bottom: 4px; right: 4px; width: 7px; height: 7px; border-radius: 999px; background: var(--accent); z-index: 2; }
</style>
</head>
<body>
<div class="app">
  <div class="body" id="screen"></div>
  <nav class="tabbar" id="tabbar"></nav>
</div>
<div class="safe-bottom"></div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="sheet-grip"></div>
  <div class="sheet-head"><div class="sheet-title" id="sheetTitle"></div><button class="icon-btn" id="sheetClose" aria-label="Close">✕</button></div>
  <div class="sheet-body" id="sheetBody"></div>
</div>
<div class="toast" id="toast"></div>

<!-- hidden file inputs -->
<input type="file" id="filePick" accept="image/*" capture="environment" class="hidden">
<input type="file" id="fileSelfie" accept="image/*" class="hidden">

<script>
"use strict";
/* ============================================================================
   StyleMate — AI-powered personal wardrobe & outfit assistant.
   A self-contained, offline-first PWA. All data (including photos) lives on the
   device in IndexedDB and localStorage; nothing is ever uploaded to a server.
   The only network calls are to the free Open-Meteo weather API when the user
   opts to share location for weather-aware suggestions.
   ========================================================================== */

/* ------------------------------- Utilities -------------------------------- */
const $ = (s, r = document) => r.querySelector(s);
const el = (tag, attrs = {}, kids = []) => {
  const n = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') n.className = attrs[k];
    else if (k === 'html') n.innerHTML = attrs[k];
    else if (k === 'text') n.textContent = attrs[k];
    else if (k.startsWith('on') && typeof attrs[k] === 'function') n.addEventListener(k.slice(2), attrs[k]);
    else if (attrs[k] != null) n.setAttribute(k, attrs[k]);
  }
  (Array.isArray(kids) ? kids : [kids]).forEach(c => { if (c != null) n.append(c.nodeType ? c : document.createTextNode(c)); });
  return n;
};
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const todayISO = () => new Date().toISOString().slice(0, 10);
const daysBetween = (a, b) => Math.round((new Date(b) - new Date(a)) / 86400000);
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const sample = (arr) => arr[Math.floor(Math.random() * arr.length)];
function shuffle(a) { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

let toastTimer;
function toast(msg) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
function haptic() { try { navigator.vibrate && navigator.vibrate(8); } catch (e) {} }

/* ------------------------------- IndexedDB -------------------------------- */
/* Photos are stored as Blobs in IndexedDB (localStorage is far too small).
   Item/outfit/profile metadata is small enough to keep in localStorage for
   simple synchronous access, but images go to IDB and are referenced by id. */
const IDB = (() => {
  let dbp;
  function open() {
    if (dbp) return dbp;
    dbp = new Promise((res, rej) => {
      const r = indexedDB.open('stylemate', 1);
      r.onupgradeneeded = () => {
        const db = r.result;
        if (!db.objectStoreNames.contains('images')) db.createObjectStore('images');
      };
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
    return dbp;
  }

// Named colour reference for nearest-match tagging.

  ['White', '#f4f5f6'], ['Cream', '#efe7d3'], ['Beige', '#d9c6a5'], ['Tan', '#c19a6b'],

  ['Teal', '#2aa198'], ['Sky', '#5fb0e5'], ['Blue', '#2f6ad9'], ['Navy', '#22335f'],

function hexToRgb(h) { const n = parseInt(h.slice(1), 16); return [n >> 16 & 255, n >> 8 & 255, n & 255]; }

  const ctx = c.getContext('2d', { willReadFrequently: true });

  // Bucket colours; ignore near-transparent and extreme white/black (likely background).

    const w = 1 + s * 2 + (l > .12 && l < .9 ? 1 : 0) - (l > .93 ? 2 : 0);
    if (w <= 0) continue;
    const key = (r >> 4) + ',' + (g >> 4) + ',' + (b >> 4);
    const cur = buckets.get(key) || { r: 0, g: 0, b: 0, w: 0 };
    cur.r += r * w; cur.g += g * w; cur.b += b * w; cur.w += w; buckets.set(key, cur);

// On-device background removal. Photographers of clothing shoot against a plain
// surface, so we estimate the backdrop colour from the four corners and
// flood-fill inward from every border pixel, clearing anything close to it.
// Only regions connected to the edge are removed, so same-coloured parts of the
// garment in the interior are kept. Returns the fraction of pixels removed so
// the caller can decide whether the cutout looks reasonable.
function removeBackground(ctx, w, h) {
  const imed = ctx.getImageData(0, 0, w, h);
  const d = imed.data;
  const corners = [[0, 0], [w - 1, 0], [0, h - 1], [w - 1, h - 1]];
  let br = 0, bg = 0, bb = 0, cn = 0;
  for (const [cx, cy] of corners) {
    for (let dy = 0; dy < 8; dy++) for (let dx = 0; dx < 8; dx++) {
      const x = clamp(cx + (cx ? -dx : dx), 0, w - 1), y = clamp(cy + (cy ? -dy : dy), 0, h - 1);
      const i = (y * w + x) * 4; br += d[i]; bg += d[i + 1]; bb += d[i + 2]; cn++;
    }
  }
  br /= cn; bg /= cn; bb /= cn;
  const TH = 46 * 46 * 3;             // squared distance threshold, fairly permissive
  const visited = new Uint8Array(w * h);
  const stack = [];
  const pushBorder = (x, y) => { const p = y * w + x; if (!visited[p]) { visited[p] = 1; stack.push(p); } };
  for (let x = 0; x < w; x++) { pushBorder(x, 0); pushBorder(x, h - 1); }
  for (let y = 0; y < h; y++) { pushBorder(0, y); pushBorder(w - 1, y); }
  const near = (i) => { const dr = d[i] - br, dg = d[i + 1] - bg, db = d[i + 2] - bb; return dr * dr + dg * dg + db * db < TH; };
  let removed = 0;
  while (stack.length) {
    const p = stack.pop(); const i = p * 4;
    if (!near(i)) continue;
    d[i + 3] = 0; removed++;                     // clear alpha
    const x = p % w, y = (p - x) / w;
    if (x > 0 && !visited[p - 1]) { visited[p - 1] = 1; stack.push(p - 1); }
    if (x < w - 1 && !visited[p + 1]) { visited[p + 1] = 1; stack.push(p + 1); }
    if (y > 0 && !visited[p - w]) { visited[p - w] = 1; stack.push(p - w); }
    if (y < h - 1 && !visited[p + w]) { visited[p + w] = 1; stack.push(p + w); }
  }
  // Soften the cut edge: pixels bordering a cleared pixel get reduced alpha.
  const a0 = new Uint8ClampedArray(w * h);
  for (let p = 0; p < w * h; p++) a0[p] = d[p * 4 + 3];
  for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
    const p = y * w + x; if (a0[p] === 0) continue;
    let edge = false;
    if (x > 0 && a0[p - 1] === 0) edge = true;
    else if (x < w - 1 && a0[p + 1] === 0) edge = true;
    else if (y > 0 && a0[p - w] === 0) edge = true;
    else if (y < h - 1 && a0[p + w] === 0) edge = true;
    if (edge) d[p * 4 + 3] = 150;
  }
  ctx.putImageData(imed, 0, 0);
  return removed / (w * h);
}

/* --------------------------- Image processing ----------------------------- */
// Downscale an uploaded photo and return {blob, hex}. When removeBg is set we
// cut out the background and emit a transparent PNG "sticker"; otherwise a JPEG.
function processImage(file, opts = {}) {
  const maxDim = opts.maxDim || 1000;
  const removeBg = !!opts.removeBg;
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      let { width: w, height: h } = img;
      const scale = Math.min(1, maxDim / Math.max(w, h));
      w = Math.max(1, Math.round(w * scale)); h = Math.max(1, Math.round(h * scale));
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      const ctx = c.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(img.src);
      let cutout = false;
      if (removeBg) {
        try { const frac = removeBackground(ctx, w, h); cutout = frac > 0.04 && frac < 0.97; } catch (e) { cutout = false; }
      }
      let hex; try { hex = dominantFromData(ctx.getImageData(0, 0, w, h).data); } catch (e) { hex = '#8a8f96'; }
      const type = cutout ? 'image/png' : 'image/jpeg';
      c.toBlob(b => { b ? resolve({ blob: b, hex, cutout }) : reject(new Error('encode failed')); }, type, 0.82);
    };
    img.onerror = () => { URL.revokeObjectURL(img.src); reject(new Error('bad image')); };
    img.src = URL.createObjectURL(file);
  });
}

/* -------------------------- Skin-tone analysis ---------------------------- */
// On-device undertone estimation from a selfie. We sample the central region
// (a rough face location), filter to skin-like pixels, and infer warm/cool/
// neutral undertone. Nothing leaves the device.
function analyzeSkin(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas'); const S = 120; c.width = S; c.height = S;
      const ctx = c.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(img, 0, 0, S, S);
      let data; try { data = ctx.getImageData(0, 0, S, S).data; } catch (e) { URL.revokeObjectURL(img.src); return reject(new Error('cannot read image')); }
      let R = 0, G = 0, B = 0, n = 0;
      for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) {
        // Focus on central band where a face usually sits.
        const cx = Math.abs(x - S / 2) / (S / 2), cy = Math.abs(y - S / 2) / (S / 2);
        if (cx > 0.55 || cy > 0.6) continue;
        const i = (y * S + x) * 4; const r = data[i], g = data[i + 1], b = data[i + 2];
        // Simple skin heuristic.
        const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
        const skin = r > 60 && g > 40 && b > 20 && r > g && g >= b && (mx - mn) > 12 && (mx - mn) < 130 && r < 250;
        if (!skin) continue;
        R += r; G += g; B += b; n++;
      }
      URL.revokeObjectURL(img.src);
      if (n < 40) return reject(new Error('no-face'));
      R /= n; G /= n; B /= n;
      const hex = rgbToHex(R, G, B);
      // Undertone: warm if red/yellow dominates over blue; cool if blue closer to red.
      const warmth = (R - B) / 255;         // higher => warmer
      const [h] = rgbToHsl(R, G, B);
      let undertone;
      if (warmth > 0.22 && (h < 45 || h > 20)) undertone = 'Warm';
      else if (warmth < 0.14) undertone = 'Cool';
      else undertone = 'Neutral';
      // Depth for contrast guidance.
      const lum = (0.299 * R + 0.587 * G + 0.114 * B);
      const depth = lum > 180 ? 'Fair' : lum > 120 ? 'Medium' : 'Deep';
      resolve({ skinHex: hex, undertone, depth });
    };
    img.onerror = () => { URL.revokeObjectURL(img.src); reject(new Error('bad image')); };
    img.src = URL.createObjectURL(file);
  });
}

/* --------------------------- Colour matching ------------------------------ */
// Does bottom colour coordinate with top colour? Neutrals go with everything.
function colorsCoordinate(hexA, hexB) {
  const nA = nearestName(hexA), nB = nearestName(hexB);
  if (NEUTRALS.has(nA) || NEUTRALS.has(nB)) return 1;
  const [hA, sA] = rgbToHsl(...hexToRgb(hexA));
  const [hB, sB] = rgbToHsl(...hexToRgb(hexB));
  if (sA < 0.18 || sB < 0.18) return 0.9; // desaturated ~ neutral
  let d = Math.abs(hA - hB); if (d > 180) d = 360 - d;
  // Analogous (close) or complementary (~180) are pleasing; clashing mid-ranges less so.
  if (d < 35) return 0.85;
  if (d > 150) return 0.8;
  if (d > 90 && d < 150) return 0.45;
  return 0.55;
}

/* =========================================================================
   OUTFIT ENGINE
   Builds 2–3 complete outfits for an occasion using only the user's items,
   scoring by formality fit, weather suitability, colour coordination and
   recency (avoid repeats).
   ========================================================================= */
function recentlyWornItemIds(days = 7) {
  const cut = new Date(Date.now() - days * 86400000).toISOString().slice(0, 10);
  const map = new Map();
  for (const o of S.outfits) if (o.date >= cut) for (const id of o.itemIds) map.set(id, Math.max(map.get(id) || 0, o.date));
  return map;
}
function weatherTags(wx) {
  const tags = new Set();
  if (!wx) return tags;
  if (wx.temp <= 12) tags.add('cold');
  else if (wx.temp >= 30) tags.add('hot');
  else tags.add('mild');
  if (wx.rain) tags.add('rain');
  return tags;
}
function scoreItem(item, occ, wxTags, recent) {
  let sc = 1;
  // Formality/style fit.
  if (item.styles && item.styles.some(s => occ.styles.includes(s))) sc += 2; else sc -= 1.2;
  // Weather suitability.
  const sub = (item.subtype || '').toLowerCase();
  const warm = ['jacket', 'hoodie', 'sweater', 'coat', 'blazer'].some(k => sub.includes(k));
  const light = ['t-shirt', 'shorts', 'linen', 'polo', 'sandals'].some(k => sub.includes(k) || (item.fabric || '').toLowerCase().includes(k));
  if (wxTags.has('cold')) { if (warm || (item.seasons || []).includes('Winter')) sc += 1.3; if (light) sc -= 1.2; }
  if (wxTags.has('hot')) { if (light || (item.seasons || []).includes('Summer')) sc += 1.1; if (warm) sc -= 1.6; }
  if (wxTags.has('rain')) { if (['boots', 'sneakers', 'sports'].some(k => sub.includes(k))) sc += 0.6; if (sub.includes('sandal') || sub.includes('loafer')) sc -= 0.6; }
  // Recency penalty.
  const r = recent.get(item.id); if (r) sc -= (7 - clamp(daysBetween(r, todayISO()), 0, 7)) * 0.35;
  // Favorite nudge.
  if (item.favorite) sc += 0.4;
  return sc;
}
function pickWeighted(cands, n) {
  // Softmax-ish weighted pick without replacement for variety across outfits.
  const out = []; const pool = cands.slice();
  for (let k = 0; k < n && pool.length; k++) {
    const weights = pool.map(c => Math.exp(c.score * 0.9) + 0.05);
    const total = weights.reduce((a, b) => a + b, 0);
    let r = Math.random() * total, idx = 0;
    for (; idx < pool.length; idx++) { r -= weights[idx]; if (r <= 0) break; }
    idx = clamp(idx, 0, pool.length - 1);
    out.push(pool[idx].item); pool.splice(idx, 1);
  }
  return out;
}
function buildOutfits(occId, wx, count = 3) {
  const occ = occById(occId);
  const wxTags = weatherTags(wx);
  const recent = recentlyWornItemIds(7);
  const avail = S.items.filter(i => !i.inWash);
  const byCat = {};
  for (const c of CATEGORIES) {
    byCat[c.id] = avail.filter(i => i.category === c.id)
      .map(item => ({ item, score: scoreItem(item, occ, wxTags, recent) }))
      .sort((a, b) => b.score - a.score);
  }
  if (!byCat.upper.length || !byCat.bottom.length) return { outfits: [], missing: missingReport(byCat) };

  const outfits = [];
  const usedSig = new Set();
  let attempts = 0;
  while (outfits.length < count && attempts < 24) {
    attempts++;
    const topPool = byCat.upper.slice(0, Math.max(3, Math.ceil(byCat.upper.length * 0.6)));
    const top = pickWeighted(topPool, 1)[0];
    if (!top) break;
    // Choose a bottom that coordinates with the top's colour.
    const bottomCands = byCat.bottom.map(b => ({ item: b.item, score: b.score + colorsCoordinate(top.color, b.item.color) * 2.2 }))
      .sort((a, b) => b.score - a.score);
    const bottom = pickWeighted(bottomCands.slice(0, Math.max(3, Math.ceil(bottomCands.length * 0.6))), 1)[0];
    if (!bottom) break;
    const foot = byCat.footwear.length ? pickWeighted(byCat.footwear.slice(0, Math.max(3, byCat.footwear.length)), 1)[0] : null;
    // 1–2 accessories that fit occasion.
    const accs = byCat.accessory.length ? pickWeighted(byCat.accessory.slice(0, Math.max(4, byCat.accessory.length)), occ.formality >= 3 ? 2 : 1) : [];
    const ids = [top.id, bottom.id, foot && foot.id, ...accs.map(a => a.id)].filter(Boolean);
    const sig = [top.id, bottom.id, foot && foot.id].filter(Boolean).sort().join('|');
    if (usedSig.has(sig)) continue;
    usedSig.add(sig);
    const coord = colorsCoordinate(top.color, bottom.color);
    outfits.push({ top, bottom, foot, accs, ids, coord });
  }
  return { outfits, missing: missingReport(byCat) };
}
function missingReport(byCat) {
  const m = [];
  if (!byCat.upper.length) m.push('upper wear');
  if (!byCat.bottom.length) m.push('bottoms');
  if (!byCat.footwear.length) m.push('footwear');
  return m;

/* ============================ WEATHER (Open-Meteo) ========================= */
let wxCache = null;
async function getWeather(force = false) {
  if (!S.location) return null;
  if (wxCache && !force && Date.now() - wxCache.at < 30 * 60000) return wxCache.data;
  try {
    const { lat, lon } = S.location;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,precipitation,weather_code,is_day&timezone=auto`;
    const r = await fetch(url); if (!r.ok) throw new Error('wx http ' + r.status);
    const j = await r.json();
    const cur = j.current;
    const data = {
      temp: Math.round(cur.temperature_2m),
      tempF: Math.round(cur.temperature_2m * 9 / 5 + 32),
      rain: (cur.precipitation || 0) > 0.1 || [51,53,55,61,63,65,80,81,82,95,96,99].includes(cur.weather_code),
      code: cur.weather_code,
      day: cur.is_day === 1,
    };
    wxCache = { at: Date.now(), data };
    return data;
  } catch (e) { return null; }
}
function wxIcon(wx) {
  if (!wx) return '📍';
  if (wx.rain) return '🌧️';
  const c = wx.code;
  if (c === 0) return wx.day ? '☀️' : '🌙';
  if ([1, 2].includes(c)) return wx.day ? '🌤️' : '☁️';
  if (c === 3) return '☁️';
  if ([45, 48].includes(c)) return '🌫️';
  if (c >= 71 && c <= 77) return '❄️';
  return '☁️';
}
function wxLabel(wx) {
  if (!wx) return 'Weather off';
  const c = wx.code; let d = 'Clear';
  if (wx.rain) d = 'Rain';
  else if (c === 3) d = 'Overcast';
  else if ([1, 2].includes(c)) d = 'Partly cloudy';
  else if ([45, 48].includes(c)) d = 'Foggy';
  else if (c >= 71 && c <= 77) d = 'Snow';
  return d;
}
function tempStr(wx) { return S.units === 'F' ? wx.tempF + '°F' : wx.temp + '°C'; }

async function requestLocation() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) { toast('Geolocation not available'); return resolve(null); }
    navigator.geolocation.getCurrentPosition(
      (pos) => { S.location = { lat: +pos.coords.latitude.toFixed(3), lon: +pos.coords.longitude.toFixed(3), label: 'Your location' }; save(); wxCache = null; resolve(S.location); },
      () => { toast('Location permission denied'); resolve(null); },
      { timeout: 8000, maximumAge: 600000 }
    );
  });
}

function fieldLabel(t) { return el('div', { style: 'font-size:12.5px;font-weight:700;color:var(--dim);margin:16px 2px 8px;letter-spacing:.02em', text: t }); }
function multiChips(options, arrRef) {
  const wrap = el('div', { class: 'chips' });
  for (const o of options) {
    const b = el('button', { class: 'chip' + (arrRef.includes(o) ? ' active' : '') }, o);
    b.addEventListener('click', () => { const i = arrRef.indexOf(o); if (i >= 0) arrRef.splice(i, 1); else arrRef.push(o); b.classList.toggle('active'); });
    wrap.append(b);
  }
  return wrap;
}
function singleChips(options, get, set) {
  const wrap = el('div', { class: 'chips' });
  const btns = [];
  for (const o of options) {
    const b = el('button', { class: 'chip' + (get() === o ? ' active' : '') }, o);
    b.addEventListener('click', () => { set(o); btns.forEach(x => x.classList.toggle('active', x === b)); });
    btns.push(b); wrap.append(b);
  }
  return wrap;
}

async function saveItem(draft, editId) {
  if (!draft.subtype) { toast('Pick an item type'); return; }
  if (!draft.styles.length) draft.styles = ['Casual'];
  if (!draft.seasons.length) draft.seasons = ['All-season'];
  let imageId = editId ? (S.items.find(i => i.id === editId) || {}).imageId : null;
  if (pendingImage) {
    const newId = 'img_' + uid();
    try { await IDB.put(newId, pendingImage.blob); } catch (e) { toast('Could not store photo'); }
    if (imageId) { revoke(imageId); IDB.del(imageId); }
    imageId = newId;
  }
  if (editId) {
    const it = S.items.find(i => i.id === editId);
    Object.assign(it, { category: draft.category, subtype: draft.subtype, color: draft.color, colorName: draft.colorName,
      pattern: draft.pattern, fabric: draft.fabric, styles: draft.styles.slice(), seasons: draft.seasons.slice(), notes: draft.notes, imageId, cutout: !!(pendingImage ? pendingImage.cutout : it.cutout) });
  } else {
    S.items.push({ id: uid(), category: draft.category, subtype: draft.subtype, color: draft.color, colorName: draft.colorName,
      pattern: draft.pattern, fabric: draft.fabric, styles: draft.styles.slice(), seasons: draft.seasons.slice(),
      notes: draft.notes, imageId, cutout: !!(pendingImage && pendingImage.cutout), inWash: false, favorite: false, createdAt: Date.now() });
  }
  pendingImage = null; pendingFile = null; save(); closeSheet(); render(); toast(editId ? 'Item updated' : 'Added to wardrobe ✓'); haptic();
}
function toggleWash(id) { const it = S.items.find(i => i.id === id); it.inWash = !it.inWash; save(); closeSheet(); render(); toast(it.inWash ? 'Moved to laundry' : 'Back in rotation'); }
function toggleFav(id) { const it = S.items.find(i => i.id === id); it.favorite = !it.favorite; save(); openItem(id); render(); }
function deleteItem(id) {
  if (!confirm('Delete this item permanently?')) return;
  const it = S.items.find(i => i.id === id);
  if (it && it.imageId) { revoke(it.imageId); IDB.del(it.imageId); }
  S.items = S.items.filter(i => i.id !== id);
  // Also drop from any saved outfits.
  S.outfits.forEach(o => o.itemIds = o.itemIds.filter(x => x !== id));
  save(); closeSheet(); render(); toast('Item deleted');
}

    res.outfits.forEach((o, i) => resultWrap.append(outfitCard(o, i, wx)));
  }
}

function outfitCard(o, idx, wx) {
  const card = el('div', { class: 'outfit', style: 'margin-bottom:14px' });
  const coordPct = Math.round(o.coord * 100);
  card.append(el('div', { class: 'outfit-head' }, [
    el('div', { class: 'outfit-title', text: `Look ${idx + 1}` }),
    el('span', { class: 'pill', text: `${coordPct >= 80 ? '🎯' : '🎨'} ${coordPct >= 80 ? 'Great match' : 'Balanced'}` }),
  ]));
  const collage = el('div', { class: 'collage' });
  const cells = [];
  const addCell = (item, label, tall) => {
    const cell = el('div', { class: 'cell' + (tall ? ' tall' : '') + (item && item.cutout ? ' checker' : '') });
    if (item) {
      attachImg(cell, item, item.cutout ? 'cut' : '');
      cell.append(el('div', { class: 'lbl' }, [ el('span', { class: 'swatch', style: `background:${item.color}` }), label + ' · ' + item.subtype ]));
      cell.append(el('button', { class: 'swap', 'aria-label': 'Swap', onclick: (e) => { e.stopPropagation(); swapItem(o, item.category, idx); } }, '⇄'));
    } else {
      cell.classList.add('empty-cell'); cell.textContent = label + '\n(none in wardrobe)';
    }
    collage.append(cell); cells.push(cell);
  };
  addCell(o.top, 'Top', true);
  addCell(o.bottom, 'Bottom');
  addCell(o.foot, 'Shoes');
  if (o.accs && o.accs.length) addCell(o.accs[0], 'Accessory', false);
  card.append(collage);

  card.append(el('div', { class: 'outfit-actions' }, [
    el('button', { class: 'btn btn-sm btn-ghost', style: 'flex:1', onclick: () => shuffleOutfit(idx) }, '🔀 Shuffle'),
    el('button', { class: 'btn btn-sm btn-ghost', style: 'flex:1', onclick: () => saveOutfit(o, false) }, '★ Save'),
    el('button', { class: 'btn btn-sm btn-primary', style: 'flex:1.3', onclick: () => wearOutfit(o) }, '✓ Wear today'),
  ]));

function shuffleOutfit(idx) {
  const { wx } = routeState.generated;
  const res = buildOutfits(routeState.occ, wx, 3);
  if (res.outfits[idx]) { routeState.generated.res.outfits[idx] = res.outfits[idx]; render(); }
}
function swapItem(outfit, category, idx) {
  const avail = S.items.filter(i => !i.inWash && i.category === category);
  if (avail.length <= 1) { toast('No other ' + catById(category).label.toLowerCase() + ' to swap'); return; }
  const key = category === 'upper' ? 'top' : category === 'bottom' ? 'bottom' : category === 'footwear' ? 'foot' : null;
  if (!key) return;
  const curId = outfit[key] && outfit[key].id;
  const others = avail.filter(i => i.id !== curId);
  const next = sample(others);
  outfit[key] = next;
  // Recompute ids and coordination.
  outfit.ids = [outfit.top && outfit.top.id, outfit.bottom && outfit.bottom.id, outfit.foot && outfit.foot.id, ...(outfit.accs || []).map(a => a.id)].filter(Boolean);
  if (outfit.top && outfit.bottom) outfit.coord = colorsCoordinate(outfit.top.color, outfit.bottom.color);
  render(); toast('Swapped ' + next.subtype); haptic();
}
function saveOutfit(o, worn) {
  const wx = routeState.generated && routeState.generated.wx;
  S.outfits.unshift({ id: uid(), occasion: routeState.occ, itemIds: o.ids.slice(), date: todayISO(), favorite: !worn, worn,
    weather: wx ? { temp: wx.temp, code: wx.code } : null });
  save(); toast(worn ? 'Logged as worn today' : 'Saved to favorites ★'); haptic();
}
function wearOutfit(o) { saveOutfit(o, true); toast('Nice! Logged for today ✓'); }

/* ============================== STUDIO ==================================== */
/* A freeform outfit canvas: drag, scale and rotate clothing cutouts into a
   flat-lay collage, save the "look", and plan it on a date. */
function renderStudio(v) {
  v.append(header('Style Studio', 'Compose a look by hand — drag your pieces onto the canvas.',
    el('button', { class: 'icon-btn', onclick: () => openCanvas(), 'aria-label': 'New look' }, '＋')));
  if (!S.items.length) {
    v.append(emptyState('👗', 'Add items first', 'Digitize a few clothes, then arrange them into looks here.',
      el('button', { class: 'btn btn-primary', onclick: () => go('wardrobe') }, 'Go to wardrobe')));
    return;
  }
  if (!S.looks.length) {
    v.append(emptyState('🎨', 'No looks yet', 'Drag clothes onto a blank canvas to build an outfit collage — like a flat-lay moodboard you style yourself.',
      el('button', { class: 'btn btn-primary', onclick: () => openCanvas() }, '＋ Create a look')));
    return;
  }
  const grid = el('div', { class: 'grid two', style: 'gap:10px' });

    renderLookInto(card, look);

    grid.append(card);

// Render a saved look's layers into a container (uses %-based placement so it
// scales to any size without measuring the DOM).
function renderLookInto(container, look) {
  container.style.position = 'relative';
  for (const l of (look.layers || []).slice().sort((a, b) => (a.z || 0) - (b.z || 0))) {
    const it = S.items.find(i => i.id === l.itemId); if (!it) continue;
    const wrap = el('div', { style: `position:absolute;left:${l.x * 100}%;top:${l.y * 100}%;width:${l.w * 100}%;transform:translate(-50%,-50%) rotate(${l.rot || 0}deg);z-index:${l.z || 0}` });
    imgURL(it.imageId).then(u => { if (u) wrap.append(el('img', { src: u, style: 'width:100%;height:auto;display:block;filter:drop-shadow(0 3px 6px rgba(0,0,0,.25))' })); });
    container.append(wrap);
  }
}

function openCanvas(lookId, planDate) {
  const existing = lookId ? S.looks.find(l => l.id === lookId) : null;
  const layers = existing ? existing.layers.map(l => Object.assign({}, l)) : [];
  let selIdx = -1;
  const els = [];

  const overlay = el('div', { class: 'studio-overlay' });
  const nameInput = el('input', { value: existing ? (existing.name || '') : '', placeholder: 'Name this look', maxlength: '40' });
  const stage = el('div', { class: 'stage' });
  const top = el('div', { class: 'studio-top' }, [
    el('button', { class: 'icon-btn', 'aria-label': 'Back', onclick: () => overlay.remove() }, '‹'),
    nameInput,
    el('button', { class: 'btn btn-sm btn-primary', onclick: saveLook }, 'Save'),
  ]);
  const stageWrap = el('div', { class: 'stage-wrap' }, stage);
  const tray = buildTray();
  overlay.append(top, stageWrap, tray);
  document.body.append(overlay);
  stage.addEventListener('pointerdown', (e) => { if (e.target === stage) { selIdx = -1; applySelection(); } });
  buildStage();

  function maxZ() { return layers.reduce((m, l) => Math.max(m, l.z || 0), 0); }
  function place(node, l) {
    node.style.left = (l.x * 100) + '%'; node.style.top = (l.y * 100) + '%';
    node.style.width = (l.w * 100) + '%'; node.style.transform = `translate(-50%,-50%) rotate(${l.rot || 0}deg)`; node.style.zIndex = l.z || 0;
  }
  function buildStage() {
    stage.querySelectorAll('.layer').forEach(n => n.remove());
    els.length = 0;
    let hint = stage.querySelector('.stage-empty');
    if (!layers.length) { if (!hint) stage.append(el('div', { class: 'stage-empty', text: 'Tap items below to drop them here, then drag, scale ↘ and rotate ⟳.' })); }
    else if (hint) hint.remove();
    layers.forEach((l, idx) => {
      const node = el('div', { class: 'layer' });
      imgURL((S.items.find(i => i.id === l.itemId) || {}).imageId).then(u => { if (u) node.prepend(el('img', { src: u })); });
      place(node, l);
      node.addEventListener('pointerdown', (e) => {
        if (e.target.classList.contains('handle')) return;
        e.preventDefault(); select(idx);
        const rect = stage.getBoundingClientRect(); const ox = l.x, oy = l.y, sx = e.clientX, sy = e.clientY;
        node.setPointerCapture(e.pointerId);
        const move = (ev) => { l.x = clamp(ox + (ev.clientX - sx) / rect.width, 0, 1); l.y = clamp(oy + (ev.clientY - sy) / rect.height, 0, 1); place(node, l); };
        const up = () => { node.removeEventListener('pointermove', move); node.removeEventListener('pointerup', up); node.removeEventListener('pointercancel', up); };
        node.addEventListener('pointermove', move); node.addEventListener('pointerup', up); node.addEventListener('pointercancel', up);
      });
      els.push(node); stage.append(node);
    });
    applySelection();
  }
  function select(idx) { selIdx = idx; const l = layers[idx]; if (l) l.z = maxZ() + 1; if (els[idx]) els[idx].style.zIndex = l.z; applySelection(); }
  function applySelection() {
    els.forEach((n, i) => {
      n.classList.toggle('sel', i === selIdx);
      n.querySelectorAll('.handle').forEach(h => h.remove());
      if (i === selIdx) { n.append(mkHandle('del', '✕', delSel)); n.append(mkHandle('scale', '⤡', startScale)); n.append(mkHandle('rot', '⟳', startRot)); }
    });
  }
  function mkHandle(cls, glyph, onDown) {
    const h = el('div', { class: 'handle ' + cls, text: glyph });
    if (cls === 'rot') h.style.cssText += 'top:-15px;right:-15px;';
    h.addEventListener('pointerdown', onDown);
    return h;
  }
  function delSel(e) { e.preventDefault(); e.stopPropagation(); if (selIdx < 0) return; layers.splice(selIdx, 1); selIdx = -1; buildStage(); }
  function startScale(e) {
    e.preventDefault(); e.stopPropagation(); const l = layers[selIdx]; if (!l) return;
    const rect = stage.getBoundingClientRect(); const h = e.target; h.setPointerCapture(e.pointerId);
    const move = (ev) => { const fx = (ev.clientX - rect.left) / rect.width; l.w = clamp(Math.abs(fx - l.x) * 2, 0.08, 1.7); place(els[selIdx], l); };
    const up = () => { h.removeEventListener('pointermove', move); h.removeEventListener('pointerup', up); };
    h.addEventListener('pointermove', move); h.addEventListener('pointerup', up);
  }
  function startRot(e) {
    e.preventDefault(); e.stopPropagation(); const l = layers[selIdx]; if (!l) return;
    const rect = stage.getBoundingClientRect(); const cx = rect.left + l.x * rect.width, cy = rect.top + l.y * rect.height;
    const h = e.target; h.setPointerCapture(e.pointerId);
    const move = (ev) => { l.rot = Math.atan2(ev.clientY - cy, ev.clientX - cx) * 180 / Math.PI + 90; place(els[selIdx], l); };
    const up = () => { h.removeEventListener('pointermove', move); h.removeEventListener('pointerup', up); };
    h.addEventListener('pointermove', move); h.addEventListener('pointerup', up);
  }
  function addLayer(itemId) { layers.push({ itemId, x: 0.5, y: 0.4 + Math.random() * 0.12, w: 0.42, rot: 0, z: maxZ() + 1 }); buildStage(); select(layers.length - 1); toast('Added — drag to arrange'); haptic(); }

  function buildTray() {
    const wrap = el('div', { class: 'studio-tray' });
    const cats = el('div', { class: 'tray-cats' });
    const items = el('div', { class: 'tray-items' });
    let active = 'upper';
    const fill = () => {
      items.innerHTML = '';
      const list = S.items.filter(i => i.category === active);
      if (!list.length) { items.append(el('div', { class: 'muted', style: 'font-size:12px;padding:22px 6px', text: 'No ' + catById(active).label.toLowerCase() + ' yet' })); return; }
      for (const it of list) { const t = el('button', { class: 'tray-item', onclick: () => addLayer(it.id) }); imgURL(it.imageId).then(u => { if (u) t.append(el('img', { src: u })); else t.append(el('div', { class: 'center', style: 'width:100%;height:100%;font-size:22px', text: catById(it.category).icon })); }); items.append(t); }
    };
    for (const c of CATEGORIES) { const b = el('button', { class: 'chip' + (c.id === active ? ' active' : ''), onclick: () => { active = c.id; [...cats.children].forEach(x => x.classList.toggle('active', x === b)); fill(); } }, `${c.icon} ${c.label}`); cats.append(b); }
    wrap.append(cats, items); fill();
    return wrap;
  }

  function saveLook() {
    if (!layers.length) { toast('Add at least one item'); return; }
    const name = (nameInput.value || '').trim() || 'Look ' + (S.looks.length + 1);
    if (existing) { existing.name = name; existing.layers = layers.map(l => Object.assign({}, l)); }
    else { const nl = { id: uid(), name, layers: layers.map(l => Object.assign({}, l)), createdAt: Date.now() }; S.looks.push(nl); lookId = nl.id; }
    if (planDate) S.plan[planDate] = { lookId: existing ? existing.id : lookId };
    save(); overlay.remove(); toast('Look saved ✓'); haptic();
    if (planDate) go('plan'); else go('studio');
  }
}

function openLookMenu(id) {

function planLook(id) {

}

/* =============================== PLAN ===================================== */
function renderPlan(v) {
  const now = new Date();
  if (!routeState.ym) routeState.ym = { y: now.getFullYear(), m: now.getMonth() };
  const { y, m } = routeState.ym;
  v.append(header('Plan', 'Plan outfits ahead — tap any day.'));

  const monthName = new Date(y, m, 1).toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
  v.append(el('div', { class: 'cal-head' }, [
    el('button', { class: 'icon-btn', 'aria-label': 'Previous month', onclick: () => { routeState.ym = shiftMonth(y, m, -1); render(); } }, '‹'),
    el('div', { style: 'font-weight:800;font-size:17px', text: monthName }),
    el('button', { class: 'icon-btn', 'aria-label': 'Next month', onclick: () => { routeState.ym = shiftMonth(y, m, 1); render(); } }, '›'),
  ]));

  const grid = el('div', { class: 'cal-grid' });
  ['S', 'M', 'T', 'W', 'T', 'F', 'S'].forEach(d => grid.append(el('div', { class: 'cal-dow', text: d })));
  const first = new Date(y, m, 1).getDay();
  const days = new Date(y, m + 1, 0).getDate();
  for (let i = 0; i < first; i++) grid.append(el('div', { class: 'cal-day blank' }));
  for (let d = 1; d <= days; d++) {
    const iso = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const isToday = iso === todayISO();
    const cell = el('button', { class: 'cal-day' + (isToday ? ' today' : ''), onclick: () => openDayPlan(iso) }, el('span', { class: 'dnum', text: d }));
    const plan = S.plan[iso];
    if (plan) {
      const pi = el('div', { class: 'planimg' });
      if (plan.lookId) { const look = S.looks.find(l => l.id === plan.lookId); if (look) renderLookInto(pi, look); }
      else if (plan.itemIds && plan.itemIds.length) { const it = S.items.find(i => i.id === plan.itemIds[0]); if (it) imgURL(it.imageId).then(u => { if (u) pi.append(el('img', { src: u })); }); }
      cell.append(pi, el('div', { class: 'dot-plan' }));
    }
    grid.append(cell);
  }
  v.append(grid);

  // Upcoming list
  const upcoming = Object.keys(S.plan).filter(d => d >= todayISO()).sort().slice(0, 5);
  if (upcoming.length) {
    v.append(el('div', { class: 'sec-title', text: 'Upcoming' }));
    const card = el('div', { class: 'card', style: 'padding:4px 14px' });
    for (const d of upcoming) {
      const plan = S.plan[d]; const look = plan.lookId ? S.looks.find(l => l.id === plan.lookId) : null;
      const label = look ? look.name : (plan.itemIds ? plan.itemIds.length + '-piece outfit' : 'Planned');
      card.append(el('button', { class: 'list-row', style: 'width:100%;background:none;border:none;border-bottom:1px solid var(--border);text-align:left;color:var(--text)', onclick: () => openDayPlan(d) }, [
        el('div', { class: 'lr-ico', text: '🗓️' }),
        el('div', { class: 'lr-main' }, [ el('div', { class: 'lr-t', text: prettyDate(d) }), el('div', { class: 'lr-s', text: label }) ]),
        el('div', { style: 'color:var(--faint);font-size:20px', text: '›' }),
      ]));
    }
    v.append(card);
  }
}
function shiftMonth(y, m, d) { const nd = new Date(y, m + d, 1); return { y: nd.getFullYear(), m: nd.getMonth() }; }

function openDayPlan(iso) {
  const body = $('#sheetBody'); body.innerHTML = ''; $('#sheetTitle').textContent = prettyDate(iso) + ' · ' + new Date(iso).toLocaleDateString(undefined, { weekday: 'long' });
  const plan = S.plan[iso];
  if (plan) {
    const prev = el('div', { class: 'tile', style: 'aspect-ratio:3/4;border-radius:14px;max-width:200px;margin:0 auto' });
    if (plan.lookId) { const look = S.looks.find(l => l.id === plan.lookId); if (look) renderLookInto(prev, look); }
    else if (plan.itemIds) { const g = el('div', { class: 'collage' }); plan.itemIds.slice(0, 4).forEach(id => { const it = S.items.find(i => i.id === id); if (!it) return; const c = el('div', { class: 'cell' }); attachImg(c, it, it.cutout ? 'cut' : ''); g.append(c); }); prev.append(g); }
    body.append(prev);
    body.append(el('button', { class: 'btn btn-danger btn-block', style: 'margin-top:12px', onclick: () => { delete S.plan[iso]; save(); closeSheet(); render(); toast('Plan cleared'); } }, 'Clear this day'));
    body.append(el('div', { class: 'sec-title', text: 'Change to' }));
  }
  // Suggest & plan an auto outfit
  body.append(el('button', { class: 'btn btn-primary btn-block', style: 'margin-bottom:8px', onclick: async () => {
    const wx = await getWeather(); const res = buildOutfits(S.lastOccasion || 'casual', wx, 1);
    if (!res.outfits.length) { toast('Add more items to auto-plan'); return; }
    S.plan[iso] = { itemIds: res.outfits[0].ids.slice() }; save(); closeSheet(); render(); toast('Auto outfit planned ✓');
  } }, '✨ Auto-suggest an outfit'));
  // Pick a saved look
  if (S.looks.length) {
    body.append(el('div', { class: 'sec-title', style: 'margin-top:14px', text: 'Or pick a saved look' }));
    const grid = el('div', { class: 'grid two', style: 'gap:8px' });
    for (const look of S.looks) { const card = el('button', { class: 'tile', style: 'aspect-ratio:3/4', onclick: () => { S.plan[iso] = { lookId: look.id }; save(); closeSheet(); render(); toast('Planned ' + (look.name || 'look')); } }); renderLookInto(card, look); card.append(el('div', { class: 'tile-meta', text: look.name || 'Look' })); grid.append(card); }
    body.append(grid);
  } else {
    body.append(el('button', { class: 'btn btn-ghost btn-block', style: 'margin-top:6px', onclick: () => { closeSheet(); openCanvas(null, iso); } }, '🎨 Style a look for this day'));
  }
  openSheet();
}

/* =============================== STYLE ==================================== */
function renderStyle(v) {
  v.append(header('Style Profile', 'Colours and fits that suit you — plus what to buy next.'));

  if (!S.profile) {
    v.append(el('div', { class: 'card', style: 'text-align:center;padding:26px' }, [

function startProfile() {

// Gap analysis: what's missing / thin, tuned to undertone.
function wardrobeGaps(p) {
  const gaps = [];
  const byCat = {}; CATEGORIES.forEach(c => byCat[c.id] = S.items.filter(i => i.category === c.id));
  const has = (cat, pred) => byCat[cat].some(pred);
  const goodColor = (PALETTES[p.undertone].good[0] || ['', 'Navy'])[0].toLowerCase();
  const store = (q) => 'https://www.google.com/search?tbm=shop&q=' + encodeURIComponent(q);

  if (!has('footwear', i => /formal|loafer/i.test(i.subtype))) {
    const rec = p.undertone === 'Warm' ? 'dark brown loafers' : 'black leather derbies';
    gaps.push({ icon: '👞', title: 'Formal footwear', why: `You lack formal shoes — ${rec} would suit your ${p.undertone.toLowerCase()} undertone and cover office, weddings and interviews.`, shop: store(rec) });
  }
  if (byCat.upper.filter(i => (i.styles || []).includes('Formal')).length < 2) {
    gaps.push({ icon: '👔', title: 'Formal shirts', why: `Few formal tops in rotation. A crisp ${p.undertone === 'Cool' ? 'white or sky-blue' : 'cream or soft-blue'} shirt maximises office & interview combinations.`, shop: store('formal shirt ' + (p.undertone === 'Cool' ? 'white' : 'light blue')) });
  }
  if (!has('upper', i => /jacket|blazer|coat|hoodie|sweater/i.test(i.subtype))) {
    gaps.push({ icon: '🧥', title: 'A layering piece', why: `No jackets or knits yet. A ${goodColor} overshirt or blazer instantly elevates casual looks and handles cool weather.`, shop: store(goodColor + ' blazer') });
  }
  if (byCat.accessory.length < 2) {
    gaps.push({ icon: '⌚', title: 'Finishing accessories', why: 'Accessories complete a look. A leather watch and matching belt pull most outfits together.', shop: store('leather watch minimalist') });
  }
  if (byCat.bottom.filter(i => (i.styles || []).includes('Formal') || /trouser|formal|chino/i.test(i.subtype)).length < 1) {
    gaps.push({ icon: '👖', title: 'Tailored trousers', why: 'A pair of well-fitting chinos or trousers bridges smart-casual and formal — currently missing.', shop: store('slim fit chinos') });
  }
  return gaps.slice(0, 4);
}

    if (!looks.length) { out.append(emptyState('🧺', 'Add more items', 'Not enough wardrobe items to pack for this trip.')); return; }

function exportData() {
  const clone = JSON.parse(JSON.stringify(S));
  const blob = new Blob([JSON.stringify(clone, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'stylemate-backup.json'; a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  toast('Metadata exported (photos stay on device)');
}
async function wipeAll() {
  if (!confirm('Delete ALL StyleMate data — every item, photo, outfit and your style profile? This cannot be undone.')) return;
  if (!confirm('Are you absolutely sure? This is permanent.')) return;
  try { await IDB.clear(); } catch (e) {}
  urlCache.forEach((u) => URL.revokeObjectURL(u)); urlCache.clear();
  localStorage.removeItem(LS_KEY);
  S = defaultState(); save();
  closeSheet(); toast('All data deleted'); go('wardrobe');
  // Re-run onboarding.
  S.onboarded = true; save();
}

function renderOnboarding() {
  let step = 0;
  const wrap = el('div', { class: 'onb' });
  const bodyEl = el('div', { class: 'onb-body' });
  const foot = el('div', { class: 'onb-foot' });
  wrap.append(bodyEl, foot);
  document.body.append(wrap);
  function draw() {
    const s = ONB_STEPS[step];
    bodyEl.innerHTML = '';
    bodyEl.append(
      el('div', { style: 'flex:1;display:flex;flex-direction:column;justify-content:center' }, [
        el('div', { class: 'onb-illus', text: s.ic }),
        el('h1', { class: 'onb-h', text: s.h }),
        el('p', { class: 'onb-p', text: s.p }),
        step === 3 ? el('div', { class: 'pill', style: 'margin-top:10px', text: '🔒 100% on-device · nothing uploaded' }) : null,
      ]));
    foot.innerHTML = '';
    const dots = el('div', { class: 'dots' }); ONB_STEPS.forEach((_, i) => dots.append(el('div', { class: 'dot' + (i === step ? ' on' : '') })));
    foot.append(dots);
    foot.append(el('button', { class: 'btn btn-primary btn-block', onclick: () => { if (step < ONB_STEPS.length - 1) { step++; draw(); } else finish(); } },
      step < ONB_STEPS.length - 1 ? 'Continue' : 'Start adding items'));
    if (step < ONB_STEPS.length - 1) foot.append(el('button', { class: 'btn btn-block', style: 'background:none;margin-top:6px;color:var(--dim)', onclick: () => finish() }, 'Skip'));
  }
  function finish() { S.onboarded = true; save(); wrap.remove(); go('wardrobe'); setTimeout(() => openAddItem(), 250); }
  draw();
}
