<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="A personal, offline habit tracker that turns daily consistency into a real monthly money reward.">
<meta name="theme-color" content="#0B0F14">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reward Habits">
<link rel="apple-touch-icon" href="./icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="manifest" href="./manifest.webmanifest">
<title>Reward Habits</title>
<style>
  :root {
    --bg: #0B0F14;
    --surface: #151B23;
    --surface-alt: #1C232D;
    --border: #28313D;
    --track: #232C36;
    --text: #F2F5F8;
    --dim: #8A97A6;
    --faint: #5C6875;
    --primary: #4CC38A;
    --primary-dark: #2E9E6B;
    --accent: #F5A623;
    --green: #3FB77E;
    --yellow: #E7B008;
    --red: #E5484D;
    --empty: #2A3441;
    --danger: #E5484D;

    --cat-Health: #3FB77E;
    --cat-Business: #4C8DFF;
    --cat-Learning: #B57BFF;
    --cat-Discipline: #F5A623;
    --cat-Other: #8A97A6;

    --sys: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; font-family: var(--sys); background: var(--bg); color: var(--text);
    -webkit-font-smoothing: antialiased; overflow: hidden;
  }
  button { font-family: var(--sys); }
  :focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

  .app {
    position: relative; width: 100%; max-width: 520px; margin: 0 auto;
    height: 100vh; height: 100dvh; background: var(--bg);
    display: flex; flex-direction: column; overflow: hidden;
    border-left: 1px solid var(--border); border-right: 1px solid var(--border);
  }
  @media (max-width: 520px) { .app { border-left: none; border-right: none; } }

  .body {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: calc(env(safe-area-inset-top) + 12px) 18px 26px; scrollbar-width: none;
  }
  .body::-webkit-scrollbar { display: none; }
  .fade { animation: fade .25s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .h-title { font-size: 28px; font-weight: 800; letter-spacing: -.02em; margin: 4px 0 2px; }
  .h-sub { color: var(--dim); font-size: 14px; margin: 0 0 14px; }
  .head-row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 14px; }
  .head-row .h-title, .head-row .h-sub { margin: 0; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 16px; }
  .card + .card { margin-top: 12px; }

  .hero { border-color: var(--primary-dark); text-align: center; padding: 22px 16px; }
  .hero .lbl { font-size: 11px; letter-spacing: .12em; color: var(--dim); font-weight: 800; }
  .reward { font-size: 46px; font-weight: 900; color: var(--primary); margin: 4px 0 2px;
    font-variant-numeric: tabular-nums; letter-spacing: -.01em; transition: transform .18s ease; }
  .reward.bump { transform: scale(1.06); }
  .hero .meta { color: var(--dim); font-size: 13px; }
  .hero .meta b { color: var(--text); font-weight: 700; }
  .bartrack { height: 14px; border-radius: 999px; background: var(--track); overflow: hidden; margin-top: 14px; }
  .barfill { height: 100%; border-radius: 999px; background: var(--primary); transition: width .35s cubic-bezier(.4,0,.2,1); }
  .range { display: flex; justify-content: space-between; margin-top: 6px; color: var(--faint); font-size: 11px; }
  .forecast { margin-top: 14px; background: var(--surface-alt); border-radius: 12px; padding: 9px 12px; color: var(--dim); font-size: 13px; }
  .forecast b { color: var(--accent); font-weight: 800; }

  .mini-row { display: flex; gap: 8px; margin-top: 12px; }
  .mini { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 6px; text-align: center; }
  .mini .v { font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .mini .v .d { color: var(--faint); font-size: 15px; }
  .mini .l { color: var(--dim); font-size: 11px; margin-top: 2px; }

  .prio { margin-top: 12px; background: var(--surface); border: 1px solid var(--border);
    border-left: 4px solid var(--cat-Health); border-radius: 16px; padding: 16px; cursor: pointer; }
  .prio .lbl { font-size: 11px; letter-spacing: .12em; color: var(--dim); font-weight: 800; }
  .prio .val { font-size: 19px; font-weight: 800; margin: 2px 0; }
  .prio .sub { color: var(--faint); font-size: 12px; }

  .section { display: flex; align-items: center; justify-content: space-between; margin: 22px 2px 10px; }
  .section .t { color: var(--dim); font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; }
  .section .pending { color: var(--dim); font-size: 13px; font-weight: 600; }

  .task { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 13px; margin-bottom: 10px; cursor: pointer; user-select: none;
    transition: transform .12s ease, background .2s ease, border-color .2s ease; width: 100%; text-align: left; }
  .task:active { transform: scale(.985); }
  .task.done { background: #122019; border-color: var(--primary-dark); }
  .box { width: 34px; height: 34px; border-radius: 9px; border: 2px solid var(--faint);
    display: flex; align-items: center; justify-content: center; flex: none; transition: background .18s, border-color .18s; }
  .box svg { width: 20px; height: 20px; stroke: #06210F; stroke-width: 3.4; fill: none; stroke-linecap: round; stroke-linejoin: round;
    stroke-dasharray: 26; stroke-dashoffset: 26; transition: stroke-dashoffset .22s ease .02s; }
  .task.done .box { background: var(--primary); border-color: var(--primary); }
  .task.done .box svg { stroke-dashoffset: 0; }
  .task .mid { flex: 1; min-width: 0; }
  .task .ti { font-size: 15px; font-weight: 700; }
  .task.done .ti { color: var(--dim); text-decoration: line-through; }
  .task .cat { display: flex; align-items: center; gap: 6px; margin-top: 3px; color: var(--dim); font-size: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .task .pts { text-align: center; flex: none; min-width: 42px; }
  .task .pts .n { font-size: 19px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; }
  .task.done .pts .n { color: var(--primary); }
  .task .pts .u { font-size: 11px; color: var(--faint); }

  .empty-hint { color: var(--dim); font-size: 14px; line-height: 1.5; }

  .calnav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .calnav .m { font-size: 18px; font-weight: 800; }
  .calnav button { width: 38px; height: 38px; border-radius: 9px; border: none; background: var(--surface-alt); color: var(--text); font-size: 22px; cursor: pointer; }
  .calnav button:disabled { opacity: .3; }
  .week, .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .week span { text-align: center; color: var(--faint); font-size: 11px; font-weight: 700; }
  .grid { margin-top: 5px; }
  .cell { aspect-ratio: 1; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--dim); }
  .cell.blank { background: transparent; }
  .cell.future { border: 1px solid var(--border); }
  .cell.today { outline: 2px solid var(--text); outline-offset: -2px; }
  .cell.green { background: var(--green); color: #0B0F14; }
  .cell.yellow { background: var(--yellow); color: #0B0F14; }
  .cell.red { background: var(--red); color: #0B0F14; }
  .cell.empty { background: var(--empty); }
  .legend { display: flex; justify-content: center; gap: 18px; margin-top: 16px; }
  .legend div { display: flex; align-items: center; gap: 6px; color: var(--dim); font-size: 12px; }
  .legend i { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  .sum-row { display: flex; gap: 8px; margin-top: 12px; }
  .sum { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 13px 6px; text-align: center; }
  .sum .v { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .sum .l { color: var(--dim); font-size: 11px; margin-top: 2px; }

  .chart { display: flex; align-items: flex-end; gap: 6px; height: 132px; }
  .chart .col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
  .chart .col .v { font-size: 10px; color: var(--dim); margin-bottom: 3px; font-variant-numeric: tabular-nums; }
  .chart .col .bar { width: 62%; min-width: 8px; border-radius: 7px; transition: height .4s cubic-bezier(.4,0,.2,1); }
  .chart-x { display: flex; gap: 6px; margin-top: 6px; }
  .chart-x span { flex: 1; text-align: center; color: var(--faint); font-size: 11px; }
  .cat { margin-bottom: 12px; }
  .cat .top { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .cat .top .n { font-size: 13px; font-weight: 700; }
  .cat .top .p { font-size: 13px; font-weight: 700; color: var(--dim); font-variant-numeric: tabular-nums; }
  .cat .tr { height: 10px; background: var(--track); border-radius: 999px; overflow: hidden; }
  .cat .fl { height: 100%; border-radius: 999px; transition: width .4s ease; }
  .topstat { display: flex; gap: 8px; margin: 6px 0 4px; }
  .topstat .t { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
  .topstat .t .v { font-size: 30px; font-weight: 900; font-variant-numeric: tabular-nums; }
  .topstat .t .l { color: var(--dim); font-size: 11px; margin-top: 2px; }

  .tabs { flex: none; display: flex; padding: 8px 4px calc(env(safe-area-inset-bottom) + 12px);
    background: var(--surface); border-top: 1px solid var(--border); }
  .tab { flex: 1; border: none; background: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--faint); }
  .tab .ic { font-size: 21px; filter: grayscale(1); opacity: .55; transition: .2s; }
  .tab .tl { font-size: 10px; font-weight: 700; }
  .tab.active { color: var(--primary); }
  .tab.active .ic { filter: none; opacity: 1; }

  .toast { position: absolute; left: 50%; bottom: calc(env(safe-area-inset-bottom) + 88px); transform: translateX(-50%) translateY(12px);
    background: var(--primary); color: #06210F; font-weight: 800; font-size: 13px; padding: 9px 16px; border-radius: 999px;
    opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; z-index: 40; box-shadow: 0 8px 24px -8px rgba(76,195,138,.6); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .btn-secondary, .btn-primary, .btn-danger {
    width: 100%; min-height: 52px; border-radius: 13px; border: 1px solid var(--border);
    background: var(--surface-alt); color: var(--text); font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 14px; }
  .btn-secondary:active, .btn-primary:active { transform: scale(.99); }
  .btn-primary { background: var(--primary); color: #06210F; border-color: var(--primary); font-weight: 800; }
  .btn-danger { background: transparent; border-color: var(--danger); color: var(--danger); }
  .btn-primary:disabled { opacity: .45; }
  .btn-row { display: flex; gap: 10px; }
  .btn-row > * { flex: 1; }

  .mtask { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border);
    border-radius: 13px; overflow: hidden; margin-bottom: 10px; }
  .mtask .stripe { width: 5px; align-self: stretch; }
  .mtask .mid { flex: 1; padding: 12px 14px; cursor: pointer; }
  .mtask .ti { font-size: 15px; font-weight: 700; }
  .mtask .sub { color: var(--dim); font-size: 12px; margin-top: 3px; }
  .mtask .sched { color: var(--faint); font-size: 12px; margin-top: 2px; }
  .mtask .right { text-align: right; padding: 0 14px; }
  .mtask .n { color: var(--accent); font-weight: 800; font-variant-numeric: tabular-nums; }
  .mtask .del { color: var(--danger); font-size: 12px; font-weight: 700; margin-top: 4px; background: none; border: none; cursor: pointer; padding: 2px 0; }

  .set-label { color: var(--dim); font-size: 12px; font-weight: 700; margin-bottom: 8px; }
  .input { width: 100%; background: var(--surface-alt); border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); font-size: 16px; padding: 13px; font-family: var(--sys); }
  .input::placeholder { color: var(--faint); }
  .set-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .set-title { font-size: 15px; font-weight: 700; }
  .set-sub { color: var(--dim); font-size: 13px; margin-top: 2px; line-height: 1.4; }
  .chip { background: var(--surface-alt); border: 1px solid var(--border); color: var(--dim);
    font-size: 13px; font-weight: 700; padding: 9px 14px; border-radius: 999px; cursor: pointer; }
  .chip.sel { background: var(--primary); border-color: var(--primary); color: #06210F; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .switch { width: 46px; height: 28px; border-radius: 999px; background: var(--border); position: relative; cursor: pointer; transition: background .2s; flex: none; }
  .switch i { position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; border-radius: 50%; background: var(--faint); transition: left .2s, background .2s; }
  .switch.on { background: var(--primary-dark); }
  .switch.on i { left: 21px; background: var(--primary); }
  .help { color: var(--dim); font-size: 13px; line-height: 1.55; margin: 0; }
  .help b { color: var(--text); }
  .total-paid { color: var(--primary); font-size: 30px; font-weight: 900; font-variant-numeric: tabular-nums; }
  .ledger-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .ledger-row:last-child { border-bottom: none; }
  .ledger-m { font-size: 14px; font-weight: 700; }
  .ledger-s { color: var(--dim); font-size: 12px; margin-top: 2px; }
  .ledger-a { color: var(--primary); font-size: 15px; font-weight: 800; }

  /* time steppers */
  .stepper-row { display: flex; align-items: center; justify-content: center; margin-top: 16px; }
  .stepcol { display: flex; flex-direction: column; align-items: center; }
  .stepbtn { background: none; border: none; color: var(--primary); font-size: 20px; font-weight: 800; cursor: pointer; padding: 6px 14px; }
  .stepval { font-size: 32px; font-weight: 900; width: 68px; text-align: center; font-variant-numeric: tabular-nums; }
  .steplbl { color: var(--faint); font-size: 11px; }
  .colon { font-size: 30px; font-weight: 900; margin: 0 8px 18px; }

  /* overlays */
  .overlay { position: absolute; inset: 0; background: var(--bg); z-index: 30; display: none; flex-direction: column; }
  .overlay.show { display: flex; }
  .ov-top { display: flex; align-items: center; justify-content: space-between; padding: calc(env(safe-area-inset-top) + 10px) 10px 10px; border-bottom: 1px solid var(--border); }
  .ov-top .tt { font-size: 16px; font-weight: 800; }
  .ov-top button { background: none; border: none; color: var(--primary); font-size: 15px; font-weight: 700; cursor: pointer; padding: 8px 12px; min-width: 76px; }
  .ov-top .spacer { min-width: 76px; }
  .ov-scroll { flex: 1; overflow-y: auto; padding: 18px; scrollbar-width: none; }
  .ov-scroll::-webkit-scrollbar { display: none; }
  .ov-foot { padding: 14px 18px calc(env(safe-area-inset-bottom) + 16px); border-top: 1px solid var(--border); }
  .field-label { color: var(--text); font-size: 14px; font-weight: 700; margin: 20px 0 9px; }
  .field-label:first-child { margin-top: 4px; }
  .wd-row { display: flex; justify-content: space-between; margin-top: 10px; }
  .wd { width: 40px; height: 40px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface-alt);
    color: var(--dim); font-size: 14px; font-weight: 700; cursor: pointer; }
  .wd.on { background: var(--primary); border-color: var(--primary); color: #06210F; font-weight: 800; }
  .hint { color: var(--faint); font-size: 12px; margin-top: 10px; line-height: 1.5; }
  .lock-banner { background: var(--surface-alt); border: 1px solid var(--accent); border-radius: 12px; padding: 13px; margin-bottom: 6px; }
  .lock-banner .lt { color: var(--text); font-size: 12px; line-height: 1.5; }
  .preview-pts { margin-top: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px; text-align: center; }
  .preview-pts .pl { color: var(--dim); font-size: 11px; font-weight: 700; letter-spacing: .1em; }
  .preview-pts .pv { color: var(--accent); font-size: 32px; font-weight: 900; margin-top: 4px; }
  .preview-pts .pn { color: var(--faint); font-size: 12px; margin-top: 6px; }
  .disabled { opacity: .45; pointer-events: none; }

  /* onboarding */
  .ob-dots { display: flex; justify-content: center; gap: 6px; margin: 6px 0 24px; }
  .ob-dots i { width: 8px; height: 8px; border-radius: 4px; background: var(--border); transition: .3s; }
  .ob-dots i.on { background: var(--primary); width: 22px; }
  .ob-emoji { font-size: 46px; }
  .ob-h1 { font-size: 28px; font-weight: 900; margin: 10px 0 6px; }

  /* month complete */
  .mc-emoji { font-size: 50px; text-align: center; }
  .mc-h1 { font-size: 28px; font-weight: 900; text-align: center; margin: 8px 0 2px; }
  .mc-month { color: var(--dim); text-align: center; margin-bottom: 16px; }
  .paid-badge { margin-top: 16px; background: #122019; border: 1px solid var(--primary-dark); border-radius: 13px; padding: 14px; text-align: center; }
  .paid-badge .pt { color: var(--primary); font-weight: 800; }
  .paid-badge .undo { color: var(--dim); font-size: 12px; text-decoration: underline; background: none; border: none; cursor: pointer; margin-top: 4px; }
  .ov-grid { display: flex; gap: 8px; width: 100%; margin-top: 10px; }
  .ov-tile { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; }
  .ov-tile .v { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .ov-tile .l { color: var(--dim); font-size: 11px; margin-top: 2px; }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<div class="app">
  <div class="body" id="screen"></div>
  <nav class="tabs" id="tabbar">
    <button class="tab" data-tab="home"><span class="ic">🏠</span><span class="tl">Home</span></button>
    <button class="tab" data-tab="tasks"><span class="ic">📝</span><span class="tl">Tasks</span></button>
    <button class="tab" data-tab="history"><span class="ic">📅</span><span class="tl">History</span></button>
    <button class="tab" data-tab="stats"><span class="ic">📊</span><span class="tl">Stats</span></button>
    <button class="tab" data-tab="settings"><span class="ic">⚙️</span><span class="tl">Settings</span></button>
  </nav>
  <div class="toast" id="toast"></div>
  <div class="overlay" id="overlay"></div>
  <input type="file" id="importFile" accept="application/json,.json" style="display:none">
</div>

<script>
(function () {
  'use strict';

  // ---------------- constants ----------------
  const IMPORTANCE = { High: 30, Medium: 20, Low: 10 };
  const CATS = ['Health', 'Business', 'Learning', 'Discipline', 'Other'];
  const IMPS = ['High', 'Medium', 'Low'];
  const WD = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const WEEKDAYS_ONLY = '1,2,3,4,5';
  const KEY = 'rewardHabits.v1';

  // ---------------- date helpers (local time) ----------------
  const pad = n => (n < 10 ? '0' + n : '' + n);
  const ymd = d => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
  const todayStr = () => ymd(new Date());
  const monthOf = s => s.slice(0, 7);
  const curMonth = () => monthOf(todayStr());
  function parse(s) { const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d); }
  function addDays(s, n) { const d = parse(s); d.setDate(d.getDate() + n); return ymd(d); }
  function weekdayOf(s) { return parse(s).getDay(); }
  function daysInMonth(mk) { const [y, m] = mk.split('-').map(Number); return new Date(y, m, 0).getDate(); }
  function datesInMonth(mk) { const out = []; const n = daysInMonth(mk); for (let i = 1; i <= n; i++) out.push(`${mk}-${pad(i)}`); return out; }
  function firstWeekday(mk) { const [y, m] = mk.split('-').map(Number); return new Date(y, m - 1, 1).getDay(); }
  function shiftMonth(mk, delta) { const [y, m] = mk.split('-').map(Number); const d = new Date(y, m - 1 + delta, 1); return `${d.getFullYear()}-${pad(d.getMonth() + 1)}`; }
  function fmtMonth(mk) { const [y, m] = mk.split('-').map(Number); return `${MONTHS[m - 1]} ${y}`; }
  function fmtLong(d) { return `${['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]}`; }
  const shortWeekday = s => WD[weekdayOf(s)];

  // ---------------- format ----------------
  function rupee(n) {
    n = Math.round(n || 0); const s = String(n);
    if (s.length <= 3) return '₹' + s;
    const last3 = s.slice(-3); let rest = s.slice(0, -3).replace(/\B(?=(\d{2})+(?!\d))/g, ',');
    return '₹' + rest + ',' + last3;
  }
  const pctStr = r => Math.round(r * 100) + '%';
  const esc = s => String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  const catColor = c => `var(--cat-${c})`;

  // ---------------- state ----------------
  function defaultState() {
    return {
      settings: { name: '', onboarded: false, reminderEnabled: true, reminderHour: 20, reminderMinute: 0, rewardMin: 10000, rewardMax: 20000 },
      tasks: [], completions: [], priorities: {}, payouts: {}, nextId: 1,
    };
  }
  const rewardMin = () => (S.settings.rewardMin != null ? S.settings.rewardMin : 10000);
  const rewardMax = () => (S.settings.rewardMax != null ? S.settings.rewardMax : 20000);
  const rupee2 = n => '₹' + Number(n).toFixed(2);
  let S;
  try { S = JSON.parse(localStorage.getItem(KEY)) || defaultState(); }
  catch (e) { S = defaultState(); }
  function save() { try { localStorage.setItem(KEY, JSON.stringify(S)); } catch (e) {} }

  // ---------------- domain logic (mirrors src/logic) ----------------
  function priorityCat() { const p = S.priorities[curMonth()]; return p ? p.category : null; }
  function taskPoints(t, pc) { const base = IMPORTANCE[t.importance] || 10; return pc && t.category === pc ? base * 2 : base; }
  function isScheduled(t, date) {
    if (!t.days || t.days === 'all') return true;
    return String(t.days).split(',').map(Number).includes(weekdayOf(date));
  }
  function isActive(t, date) {
    if (t.createdDate && t.createdDate > date) return false;
    if (t.archived && t.archivedDate && t.archivedDate <= date) return false;
    return isScheduled(t, date);
  }
  function activeOn(date) { return S.tasks.filter(t => isActive(t, date)); }
  function indexCompletions() {
    const by = {};
    for (const c of S.completions) {
      let e = by[c.date]; if (!e) { e = by[c.date] = { done: new Set(), earned: 0 }; }
      e.done.add(c.taskId); e.earned += c.points || 0;
    }
    return by;
  }
  function dayStatus(date, by, pc) {
    const active = activeOn(date); const total = active.length;
    if (total === 0) return { status: 'empty', total: 0, done: 0, possible: 0, earned: 0 };
    const done = by[date] ? by[date].done : new Set();
    let d = 0, earned = 0, possible = 0;
    for (const t of active) { const p = taskPoints(t, pc); possible += p; if (done.has(t.id)) { d++; earned += p; } }
    return { status: d === total ? 'green' : d > 0 ? 'yellow' : 'red', total, done: d, possible, earned };
  }
  function earliest() {
    let e = null; for (const t of S.tasks) if (t.createdDate && (!e || t.createdDate < e)) e = t.createdDate;
    return e || todayStr();
  }
  function currentStreak(by, pc) {
    const today = todayStr(); const floor = earliest(); let d = today, streak = 0;
    while (d >= floor) {
      const st = dayStatus(d, by, pc).status;
      if (st === 'green') streak++;
      else if (st === 'empty') { /* skip */ }
      else if (d === today) { /* in progress */ }
      else break;
      d = addDays(d, -1);
    }
    return streak;
  }
  function bestStreak(by, pc) {
    const today = todayStr(); let d = earliest(), best = 0, run = 0;
    while (d <= today) {
      const st = dayStatus(d, by, pc).status;
      if (st === 'green') { run++; if (run > best) best = run; }
      else if (st === 'empty') { /* skip */ }
      else run = 0;
      d = addDays(d, 1);
    }
    return best;
  }
  function monthBonus(mk, by, pc) {
    const today = todayStr(); const last = `${mk}-${pad(daysInMonth(mk))}`;
    const end = today < last ? today : last; let d = `${mk}-01`, run = 0, bonus = 0;
    while (d <= end) {
      const st = dayStatus(d, by, pc).status;
      if (st === 'green') run++;
      else if (st === 'empty') { /* skip */ }
      else { bonus += Math.floor(run / 7) * 50; run = 0; }
      d = addDays(d, 1);
    }
    return bonus + Math.floor(run / 7) * 50;
  }
  function ratio(earned, possible) { if (!possible || possible <= 0) return 0; return Math.max(0, Math.min(1, earned / possible)); }
  function rewardFor(r) { return Math.round(Math.min(20000, Math.max(10000, 10000 + r * 10000))); }
  function isLocked(id) { const mk = curMonth(); return S.completions.some(c => c.taskId === id && monthOf(c.date) === mk); }

  function summary() {
    const today = todayStr(); const mk = monthOf(today); const pc = priorityCat();
    const by = indexCompletions();
    const todays = activeOn(today).map(t => ({ ...t, pts: taskPoints(t, pc), done: by[today] ? by[today].done.has(t.id) : false }));
    const todayPossible = todays.reduce((s, t) => s + t.pts, 0);
    const todayEarned = todays.reduce((s, t) => s + (t.done ? t.pts : 0), 0);
    const todayDone = todays.filter(t => t.done).length;
    // Per-day accrual model: each day is worth an equal slice of the reward
    // range, (max - min) / daysInMonth. A day contributes (earned/possible) of
    // its slice. Missed days simply add nothing — they never subtract what you
    // already banked. Complete everything every day of the month to reach max.
    const N = daysInMonth(mk);
    const min = rewardMin(), max = rewardMax();
    const perDay = N > 0 ? (max - min) / N : 0;
    let monthPossible = 0, monthEarned = 0, accrued = 0, d = `${mk}-01`;
    while (d <= today) {
      const st = dayStatus(d, by, pc);
      monthPossible += st.possible; monthEarned += st.earned;
      if (st.possible > 0) accrued += (st.earned / st.possible) * perDay;
      d = addDays(d, 1);
    }
    const bonus = monthBonus(mk, by, pc);
    const reward = Math.round(Math.max(min, Math.min(max, min + accrued)));
    const cons = ratio(monthEarned, monthPossible);            // avg daily completion
    const prog = (max - min) > 0 ? (reward - min) / (max - min) : 0; // bar: money banked
    // forecast: finish today, then every remaining day of the month
    const last = `${mk}-${pad(N)}`;
    const remainToday = todayPossible > 0 ? (1 - todayEarned / todayPossible) * perDay : 0;
    let futureAccrual = 0, fd = addDays(today, 1);
    while (fd <= last) { if (activeOn(fd).length > 0) futureAccrual += perDay; fd = addDays(fd, 1); }
    const projReward = Math.round(Math.max(min, Math.min(max, reward + remainToday + futureAccrual)));
    return {
      today, mk, todays, todayPossible, todayEarned, todayDone, todayCount: todays.length,
      monthPossible, monthEarned, bonus, totalPoints: monthEarned + bonus,
      cons, prog, reward, perDay, rewardMin: min, rewardMax: max, daysInMonth: N,
      currentStreak: currentStreak(by, pc), bestStreak: bestStreak(by, pc), projReward, by, pc,
    };
  }

  // ---------------- mutations ----------------
  function newId() { return S.nextId++; }
  function toggleTask(id) {
    const today = todayStr();
    const i = S.completions.findIndex(c => c.taskId === id && c.date === today);
    if (i >= 0) { S.completions.splice(i, 1); return false; }
    const t = S.tasks.find(x => x.id === id); if (!t) return false;
    S.completions.push({ taskId: id, date: today, points: taskPoints(t, priorityCat()) });
    return true;
  }
  function addTask(data) {
    S.tasks.push({ id: newId(), title: data.title.trim(), category: data.category, importance: data.importance,
      days: data.days || 'all', createdDate: todayStr(), archived: false, archivedDate: null });
  }
  function updateTask(id, data) {
    const t = S.tasks.find(x => x.id === id); if (!t) return;
    if (isLocked(id)) { t.title = data.title.trim(); }
    else { t.title = data.title.trim(); t.category = data.category; t.importance = data.importance; t.days = data.days || 'all'; }
  }
  function deleteTask(id) {
    if (isLocked(id)) return { locked: true };
    const hasHistory = S.completions.some(c => c.taskId === id);
    const t = S.tasks.find(x => x.id === id);
    if (hasHistory) { t.archived = true; t.archivedDate = todayStr(); }
    else { S.tasks = S.tasks.filter(x => x.id !== id); }
    return { locked: false };
  }
  function setPriority(cat, label) { S.priorities[curMonth()] = { category: cat, label: label || cat }; }
  function totalPaid() { return Object.values(S.payouts).reduce((s, p) => s + (p.paid ? p.amount : 0), 0); }

  function renderTasks() {

  function renderHistory() {

  function renderStats() {
    const s = summary(); const today = todayStr(); const mk = curMonth();
    // last 7 days
    const byDate = {}; for (const c of S.completions) byDate[c.date] = (byDate[c.date] || 0) + c.points;
    let week = []; for (let i = 6; i >= 0; i--) { const d = addDays(today, -i); week.push({ l: shortWeekday(d), v: byDate[d] || 0 }); }
    // last 6 months
    const byMonth = {}; for (const c of S.completions) { const m = monthOf(c.date); byMonth[m] = (byMonth[m] || 0) + c.points; }
    let months = []; for (let i = 5; i >= 0; i--) { const m = shiftMonth(mk, -i); months.push({ l: MONTHS[Number(m.slice(5)) - 1].slice(0, 3), v: byMonth[m] || 0 }); }
    // category breakdown this month

    const lifetime = S.completions.reduce((a, c) => a + c.points, 0);

  function barChart(data, color) {

        <div class="set-label" style="margin-top:14px">Minimum (₹)</div>
        <input class="input" id="rewardMinInput" type="number" inputmode="numeric" value="${rewardMin()}">
        <div class="set-label" style="margin-top:14px">Maximum (₹)</div>
        <input class="input" id="rewardMaxInput" type="number" inputmode="numeric" value="${rewardMax()}">
        <button class="btn-secondary" data-act="saverange">Save range</button>
        <p class="hint">Each fully-completed day is worth ${rupee2((rewardMax() - rewardMin()) / daysInMonth(curMonth()))} this month (${rupee(rewardMax() - rewardMin())} ÷ ${daysInMonth(curMonth())} days).</p>
      </div>
      <div class="section"><span class="t">How rewards work</span></div>
      <div class="card"><p class="help">Each day you complete <b>all</b> your tasks, you bank one day's slice: <b>(max − min) ÷ days in the month</b>. Do everything every day to reach the maximum. A partial day banks part of its slice; a missed day banks nothing but never takes money away. Everything resets on the 1st; your tasks carry over.</p></div>
      <button class="btn-danger" data-act="reset">Reset all data</button>
      <div style="height:16px"></div>`;
  }

  // ---------------- overlays ----------------
  function openOverlay(html) { overlay.innerHTML = html; overlay.classList.add('show'); }
  function closeOverlay() { overlay.classList.remove('show'); overlay.innerHTML = ''; }

  // task editor
  function openEditor(id) {
    const t = id ? S.tasks.find(x => x.id === id) : null;
    ui.editor = t ? { id, title: t.title, category: t.category, importance: t.importance, days: t.days || 'all' }
                   : { id: null, title: '', category: 'Health', importance: 'Medium', days: 'all' };
    renderEditor(true);
  }
  function syncEditorTitle() { const el = document.getElementById('edTitle'); if (el) ui.editor.title = el.value; }
  function renderEditor(focus) {
    const e = ui.editor; const pc = priorityCat();
    const locked = e.id != null && isLocked(e.id);
    const preset = e.days === 'all' ? 'all' : e.days === WEEKDAYS_ONLY ? 'weekdays' : 'custom';
    const sel = (e.days && e.days !== 'all') ? String(e.days).split(',').map(Number) : [0,1,2,3,4,5,6];
    const pts = taskPoints({ category: e.category, importance: e.importance }, pc);
    openOverlay(`
      <div class="ov-top">
        <button data-act="closeov">Cancel</button>
        <div class="tt">${e.id ? 'Edit task' : 'New task'}</div>
        <div class="spacer"></div>
      </div>
      <div class="ov-scroll">
        ${locked ? `<div class="lock-banner"><div class="lt">🔒 Locked this month — you've earned points from this task, so its points &amp; schedule are frozen to keep your reward honest. You can still fix the name.</div></div>` : ''}
        <div class="field-label">Task</div>
        <input class="input" id="edTitle" value="${esc(e.title)}" placeholder="e.g. Read 20 pages">
        <div class="field-label">Category</div>
        <div class="chips ${locked ? 'disabled' : ''}">${CATS.map(c => `<button class="chip ${e.category === c ? 'sel' : ''}" data-act="edcat" data-v="${c}">${c}</button>`).join('')}</div>
        <div class="field-label">Importance</div>
        <div class="chips ${locked ? 'disabled' : ''}">${IMPS.map(i => `<button class="chip ${e.importance === i ? 'sel' : ''}" data-act="edimp" data-v="${i}">${i} (${IMPORTANCE[i]})</button>`).join('')}</div>
        <div class="field-label">Repeat</div>
        <div class="chips ${locked ? 'disabled' : ''}">
          <button class="chip ${preset === 'all' ? 'sel' : ''}" data-act="edpreset" data-v="all">Every day</button>
          <button class="chip ${preset === 'weekdays' ? 'sel' : ''}" data-act="edpreset" data-v="weekdays">Weekdays</button>
          <button class="chip ${preset === 'custom' ? 'sel' : ''}" data-act="edpreset" data-v="custom">Custom</button>
        </div>
        ${preset === 'custom' ? `<div class="wd-row ${locked ? 'disabled' : ''}">${WD.map((w, i) => `<button class="wd ${sel.includes(i) ? 'on' : ''}" data-act="edday" data-v="${i}">${w[0]}</button>`).join('')}</div>` : ''}
        <div class="hint">Days with no task become rest days — they never break your streak.</div>
        <div class="preview-pts"><div class="pl">WORTH PER DAY</div><div class="pv">+${pts} pts</div>
          <div class="pn">${pc && e.category === pc ? '⭐ Doubled — matches the monthly priority' : 'Match the monthly priority category for 2×.'}</div></div>
      </div>
      <div class="ov-foot"><button class="btn-primary" data-act="savetask" ${e.title.trim() ? '' : 'disabled'}>${e.id ? 'Save changes' : 'Add task'}</button></div>
    `);
    if (focus) { const el = document.getElementById('edTitle'); if (el && !e.id) el.focus(); }
  }

  // set priority
  function openPriority() {
    const p = S.priorities[curMonth()];
    ui.prio = { category: p ? p.category : 'Health', label: p ? p.label : '' };
    renderPriority();
  }
  function syncPrioLabel() { const el = document.getElementById('prioLabel'); if (el) ui.prio.label = el.value; }
  function renderPriority() {
    const pr = ui.prio;
    openOverlay(`
      <div class="ov-top"><button data-act="closeov">Cancel</button><div class="tt">Monthly priority</div><div class="spacer"></div></div>
      <div class="ov-scroll">
        <div style="color:var(--primary);font-weight:800;font-size:18px">${fmtMonth(curMonth())}</div>
        <p class="help" style="margin-top:8px">Choose one focus for this month. Tasks tagged with the matching category earn double points.</p>
        <div class="field-label">Goal name</div>
        <input class="input" id="prioLabel" value="${esc(pr.label)}" placeholder="e.g. Weight Loss, Business Growth">
        <div class="field-label">Category (for 2× matching)</div>
        <div class="chips">${CATS.map(c => `<button class="chip ${pr.category === c ? 'sel' : ''}" data-act="priocat" data-v="${c}">${c}</button>`).join('')}</div>
      </div>
      <div class="ov-foot"><button class="btn-primary" data-act="saveprio">Save priority</button></div>
    `);
  }

  // month complete
  function openMonth() {
    const s = summary(); const payout = S.payouts[s.mk]; const paid = payout && payout.paid;
    openOverlay(`
      <div class="ov-top"><div class="spacer"></div><div class="tt">Month summary</div><button data-act="closeov">Done</button></div>
      <div class="ov-scroll">
        <div class="mc-emoji">🏁</div><div class="mc-h1">Month Complete</div><div class="mc-month">${fmtMonth(s.mk)}</div>
        <div class="card hero">
          <div class="lbl">YOUR REWARD</div><div class="reward">${rupee(s.reward)}</div>
          <div class="meta">Pay this to yourself 🎉</div>
          <div class="bartrack"><div class="barfill" style="width:${s.prog * 100}%"></div></div>
          <div class="range"><span>${rupee(s.rewardMin)}</span><span>${rupee(s.rewardMax)}</span></div>
        </div>
        <div class="ov-grid"><div class="ov-tile"><div class="v" style="color:var(--primary)">${pctStr(s.cons)}</div><div class="l">Consistency</div></div>
          <div class="ov-tile"><div class="v" style="color:var(--accent)">${s.totalPoints}</div><div class="l">Total points</div></div></div>
        <div class="ov-grid"><div class="ov-tile"><div class="v">${s.bestStreak}d</div><div class="l">Best streak</div></div>
          <div class="ov-tile"><div class="v" style="color:var(--accent)">+${s.bonus}</div><div class="l">Streak bonus</div></div></div>
        ${paid ? `<div class="paid-badge"><div class="pt">✓ Paid to yourself — ${rupee(payout.amount)}</div><button class="undo" data-act="unpay">Undo</button></div>`
               : `<button class="btn-primary" data-act="pay">✓ Mark as paid to myself</button>`}
        <p class="hint" style="text-align:center;margin-top:16px">A new month starts fresh — points reset to zero and you can set a new priority. Your tasks carry over.</p>
      </div>`);
  }

  // onboarding
  function openOnboarding() {
    ui.ob = { step: 0, name: '', label: '', category: 'Health',
      tasks: [{ title: '', category: 'Health', importance: 'Medium' }, { title: '', category: 'Discipline', importance: 'Medium' }, { title: '', category: 'Learning', importance: 'Medium' }] };
    renderOnboarding(true);
  }
  function syncOb() {
    const ob = ui.ob;
    if (ob.step === 0) { const el = document.getElementById('obName'); if (el) ob.name = el.value; }
    if (ob.step === 1) { const el = document.getElementById('obLabel'); if (el) ob.label = el.value; }
    if (ob.step === 2) { ob.tasks.forEach((t, i) => { const el = document.getElementById('obTask' + i); if (el) t.title = el.value; }); }
  }
  function renderOnboarding(focus) {
    const ob = ui.ob;
    let body = '';
    if (ob.step === 0) {
      body = `<div class="ob-emoji">👋</div><div class="ob-h1">Welcome</div>
        <p class="help">Build daily habits, earn points, and pay yourself a real reward every month — from ₹10,000 up to ₹20,000.</p>
        <div class="field-label">What should we call you?</div>
        <input class="input" id="obName" value="${esc(ob.name)}" placeholder="Your name">`;
    } else if (ob.step === 1) {
      body = `<div class="ob-emoji">🎯</div><div class="ob-h1">This month's priority</div>
        <p class="help">Pick one focus. Tasks in this category earn double points, so you stay pulled toward what matters.</p>
        <div class="field-label">Name your goal</div>
        <input class="input" id="obLabel" value="${esc(ob.label)}" placeholder="e.g. Weight Loss, Learning">
        <div class="field-label">Category (2× matching)</div>
        <div class="chips">${CATS.map(c => `<button class="chip ${ob.category === c ? 'sel' : ''}" data-act="obcat" data-v="${c}">${c}</button>`).join('')}</div>`;
    } else {
      body = `<div class="ob-emoji">✅</div><div class="ob-h1">Your first tasks</div>
        <p class="help">Add up to three daily tasks to start. You can change these anytime.</p>
        ${ob.tasks.map((t, i) => `<input class="input" id="obTask${i}" value="${esc(t.title)}" placeholder="Task ${i + 1} (e.g. Workout 30 min)" style="margin-top:10px">`).join('')}`;
    }
    const lastStep = ob.step === 2;
    const canNext = ob.step === 0 ? ob.name.trim().length > 0 : true;
    openOverlay(`
      <div class="ov-scroll" style="padding-top:calc(env(safe-area-inset-top) + 24px)">
        <div class="ob-dots">${[0,1,2].map(i => `<i class="${i <= ob.step ? 'on' : ''}"></i>`).join('')}</div>
        ${body}
      </div>
      <div class="ov-foot"><div class="btn-row">
        ${ob.step > 0 ? `<button class="btn-secondary" data-act="obback" style="margin-top:0">Back</button>` : ''}
        <button class="btn-primary" data-act="obnext" style="margin-top:0" ${canNext ? '' : 'disabled'}>${lastStep ? 'Start earning' : 'Continue'}</button>
      </div></div>`);
    if (focus && ob.step === 0) { const el = document.getElementById('obName'); if (el) el.focus(); }
  }

  // ---------------- backup ----------------
  function exportData() {
    const blob = new Blob([JSON.stringify({ app: 'reward-habits', version: 1, exportedAt: new Date().toISOString(), state: S }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob); const a = document.createElement('a');
    a.href = url; a.download = `reward-habits-backup-${todayStr()}.json`; document.body.appendChild(a); a.click();
    document.body.removeChild(a); setTimeout(() => URL.revokeObjectURL(url), 1000);
    toast('Backup downloaded');
  }
  importFile.addEventListener('change', e => {
    const file = e.target.files && e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        const st = parsed.state || parsed;
        if (!st.tasks || !st.settings) throw new Error('bad');
        S = st; save(); ui.month = curMonth(); toast('Data restored'); boot();
      } catch (err) { alert('That file is not a valid Reward Habits backup.'); }
    };
    reader.readAsText(file); e.target.value = '';
  });

  // ---------------- event handling ----------------
  tabbar.addEventListener('click', e => { const b = e.target.closest('[data-tab]'); if (b) setTab(b.dataset.tab); });

  // Live input sync so validation-driven buttons enable/disable as you type
  // (without a full re-render that would drop focus).
  document.addEventListener('input', e => {
    const t = e.target;
    if (t.id === 'obName' && ui.ob) {
      ui.ob.name = t.value;
      const b = overlay.querySelector('[data-act="obnext"]');
      if (b) b.disabled = ui.ob.step === 0 && !t.value.trim();
    } else if (t.id === 'edTitle' && ui.editor) {
      ui.editor.title = t.value;
      const b = overlay.querySelector('[data-act="savetask"]');
      if (b) b.disabled = !t.value.trim();
    }
  });

  document.addEventListener('click', e => {
    const el = e.target.closest('[data-act]'); if (!el) return;
    const act = el.dataset.act; const id = el.dataset.id ? Number(el.dataset.id) : null; const v = el.dataset.v;

    switch (act) {
      // home
      case 'toggle': {
        const now = toggleTask(id); save();
        vibrate(now ? 14 : 8);
        renderTab();
        const r = document.getElementById('rewardNum'); if (r) { r.classList.add('bump'); setTimeout(() => r.classList.remove('bump'), 200); }
        if (now) { const t = S.tasks.find(x => x.id === id); if (t) toast('+' + taskPoints(t, priorityCat()) + ' pts 🎉'); }
        break;
      }
      case 'month': openMonth(); break;
      case 'setprio': openPriority(); break;
      case 'add': openEditor(null); break;

      // tasks
      case 'edit': openEditor(id); break;
      case 'del': {
        const t = S.tasks.find(x => x.id === id);
        if (isLocked(id)) { alert('Locked this month — you\'ve earned points from this task, so it can\'t be removed until the 1st. This keeps your reward honest.'); break; }
        if (confirm(`Delete "${t.title}"?`)) { deleteTask(id); save(); renderTab(); }
        break;
      }

      // editor
      case 'edcat': syncEditorTitle(); ui.editor.category = v; renderEditor(); break;
      case 'edimp': syncEditorTitle(); ui.editor.importance = v; renderEditor(); break;
      case 'edpreset':
        syncEditorTitle();
        ui.editor.days = v === 'all' ? 'all' : v === 'weekdays' ? WEEKDAYS_ONLY : (ui.editor.days === 'all' ? WEEKDAYS_ONLY : ui.editor.days);
        renderEditor(); break;
      case 'edday': {
        syncEditorTitle();
        const set = new Set((ui.editor.days && ui.editor.days !== 'all') ? String(ui.editor.days).split(',').map(Number) : [0,1,2,3,4,5,6]);
        const day = Number(v); set.has(day) ? set.delete(day) : set.add(day);
        if (set.size > 0) ui.editor.days = set.size === 7 ? 'all' : [...set].sort((a,b)=>a-b).join(',');
        renderEditor(); break;
      }
      case 'savetask': {
        syncEditorTitle();
        const e2 = ui.editor; if (!e2.title.trim()) break;
        if (e2.id) updateTask(e2.id, e2); else addTask(e2);
        save(); closeOverlay(); renderTab(); break;
      }

      // priority
      case 'priocat': syncPrioLabel(); ui.prio.category = v; renderPriority(); break;
      case 'saveprio': syncPrioLabel(); setPriority(ui.prio.category, ui.prio.label.trim() || ui.prio.category); save(); closeOverlay(); renderTab(); break;

      // month complete
      case 'pay': {
        const s = summary(); S.payouts[s.mk] = { amount: s.reward, consistency: s.cons, points: s.totalPoints, paid: true, paidAt: new Date().toISOString() };
        save(); openMonth(); toast('Logged to your ledger'); break;
      }
      case 'unpay': { const s = summary(); delete S.payouts[s.mk]; save(); openMonth(); break; }

      // onboarding
      case 'obcat': syncOb(); ui.ob.category = v; renderOnboarding(); break;
      case 'obback': syncOb(); ui.ob.step--; renderOnboarding(true); break;
      case 'obnext': {
        syncOb();
        if (ui.ob.step < 2) { ui.ob.step++; renderOnboarding(true); break; }
        const ob = ui.ob;
        S.settings.name = ob.name.trim();
        setPriority(ob.category, ob.label.trim() || ob.category);
        ob.tasks.forEach(t => { if (t.title.trim()) addTask({ title: t.title, category: t.category, importance: t.importance, days: 'all' }); });
        S.settings.onboarded = true; save(); closeOverlay(); boot(); break;
      }

      // settings
      case 'savename': { const el = document.getElementById('nameInput'); if (el) { S.settings.name = el.value.trim(); save(); toast('Saved'); } break; }
      case 'saverange': {
        const minEl = document.getElementById('rewardMinInput'), maxEl = document.getElementById('rewardMaxInput');
        const mn = Math.round(Number(minEl.value)), mx = Math.round(Number(maxEl.value));
        if (!isFinite(mn) || !isFinite(mx) || mn < 0 || mx <= mn) { alert('Enter a valid range — the maximum must be greater than the minimum.'); break; }
        S.settings.rewardMin = mn; S.settings.rewardMax = mx; save(); renderTab(); toast('Reward range saved');
        break;
      }
      case 'togglereminder': S.settings.reminderEnabled = !S.settings.reminderEnabled; save(); renderTab(); break;
      case 'hourup': S.settings.reminderHour = (S.settings.reminderHour + 1) % 24; save(); renderTab(); break;
      case 'hourdn': S.settings.reminderHour = (S.settings.reminderHour + 23) % 24; save(); renderTab(); break;
      case 'minup': S.settings.reminderMinute = (S.settings.reminderMinute + 5) % 60; save(); renderTab(); break;
      case 'mindn': S.settings.reminderMinute = (S.settings.reminderMinute + 55) % 60; save(); renderTab(); break;
      case 'export': exportData(); break;
      case 'import': importFile.click(); break;
      case 'reset': if (confirm('This permanently deletes all tasks, history and rewards. Continue?')) { S = defaultState(); save(); ui = { tab: 'home', month: curMonth(), editor: null, ob: null }; boot(); } break;

      // history
      case 'prevmonth': ui.month = shiftMonth(ui.month, -1); renderTab(); break;
      case 'nextmonth': if (ui.month < curMonth()) { ui.month = shiftMonth(ui.month, 1); renderTab(); } break;

      case 'closeov': closeOverlay(); break;
    }
  });

  // ---------------- boot ----------------
  function boot() {
    if (!S.settings.onboarded) { renderTab(); syncTabbar(); openOnboarding(); }
    else { closeOverlay(); setTab(ui.tab || 'home'); }
  }
  boot();
})();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('./sw.js').catch(function () {});
    });
  }
</script>
</body>
</html>
